/* --- Fullmakt document --------------------------------------- */
.fm-doc { border: var(--bw) solid var(--ink-900); background: var(--paper); padding: var(--s-5); max-height: 260px; overflow-y: auto; font-size: 13px; line-height: 1.6; color: var(--ink-700); }
.fm-doc__head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--s-3); border-bottom: var(--bw) solid var(--ink-900); padding-bottom: var(--s-3); margin-bottom: var(--s-3); flex-wrap: wrap; }
.fm-doc__head b { font-family: var(--font-display); font-size: 15px; letter-spacing: 0.02em; }
.fm-doc__head span { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); text-transform: uppercase; letter-spacing: 0.05em; }
.fm-doc h4 { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-900); margin: var(--s-4) 0 4px; }
.fm-doc p { margin: 0 0 var(--s-2); }

.fm-cer { display: flex; flex-direction: column; gap: var(--s-4); }
.fm-agree { display: flex; gap: 12px; align-items: flex-start; cursor: pointer; font-size: 13px; line-height: 1.55; color: var(--ink-700); }
.fm-agree input { appearance: none; width: 22px; height: 22px; border: 2px solid var(--ink-900); background: var(--paper); cursor: pointer; flex: 0 0 auto; margin: 1px 0 0; position: relative; }
.fm-agree input:checked { background: var(--green-500); }
.fm-agree input:checked::after { content: ''; position: absolute; inset: 4px 5px 7px; border-left: 3px solid var(--ink-900); border-bottom: 3px solid var(--ink-900); transform: rotate(-45deg); }
.fm-foot { display: flex; gap: var(--s-5); flex-wrap: wrap; font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); }
.fm-foot span { display: inline-flex; align-items: center; gap: 6px; }
.fm-foot .icon { color: var(--green-700); display: flex; }

.fm-signed { display: flex; align-items: center; gap: var(--s-4); border: var(--bw) solid var(--ink-900); background: var(--green-100); padding: var(--s-4) var(--s-5); }
.fm-signed__ic { width: 44px; height: 44px; flex: 0 0 auto; border: var(--bw) solid var(--ink-900); background: var(--ink-900); color: var(--green-300); display: flex; align-items: center; justify-content: center; }
.fm-signed b { font-family: var(--font-display); font-size: 15px; font-weight: 600; display: block; }
.fm-signed .bankid-mark, .fm-signed .bankid-mark b { display: inline; }
.fm-signed p { margin: 2px 0 0; font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); }

/* --- Generic modal shell ------------------------------------- */
.modal { background: var(--paper); border: var(--bw) solid var(--ink-900); box-shadow: var(--shadow-lg); width: 100%; max-width: 560px; max-height: 86vh; display: flex; flex-direction: column; }
.modal__head { display: flex; align-items: center; justify-content: space-between; gap: var(--s-3); padding: var(--s-4) var(--s-5); border-bottom: var(--bw) solid var(--ink-900); }
.modal__head b { font-family: var(--font-display); font-size: 17px; }
.fm-modal__body { padding: var(--s-5); overflow-y: auto; display: flex; flex-direction: column; gap: var(--s-4); }

/* --- Payment picker ------------------------------------------ */
.pay-opts { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-3); }
.pay-opt { position: relative; border: var(--bw) solid var(--ink-900); background: var(--paper); color: var(--ink-900); padding: var(--s-4); text-align: left; cursor: pointer; font-family: inherit; display: flex; flex-direction: column; gap: 4px; }
.pay-opt:hover { box-shadow: var(--shadow-sm); }
.pay-opt.is-on { background: var(--green-100); box-shadow: var(--shadow); }
.pay-opt b { font-family: var(--font-display); font-size: 15px; }
.pay-opt span:last-child { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); }
.pay-opt__chk { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border: 2px solid var(--ink-900); background: var(--paper); display: flex; align-items: center; justify-content: center; }
.pay-opt.is-on .pay-opt__chk { background: var(--green-500); }

/* --- PDP auto-buy box ----------------------------------------- */
.abox { border: var(--bw) solid var(--ink-900); background: var(--paper); margin-top: var(--s-4); }
.abox__head { display: flex; align-items: center; justify-content: space-between; gap: var(--s-3); padding: 10px var(--s-4); border-bottom: var(--bw) solid var(--ink-900); background: var(--ink-900); color: var(--paper); flex-wrap: wrap; }
.abox__title { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
.abox__title .icon { color: var(--green-500); display: flex; }
.abox__cov { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--green-300); }
.abox__cov.off { color: var(--ink-400); }
.abox__form { display: grid; grid-template-columns: 1fr auto auto auto; gap: var(--s-4); align-items: end; padding: var(--s-4); }
.abox__sel { height: 46px; border: var(--bw) solid var(--ink-900); background: var(--paper); font-family: var(--font-mono); font-size: 13px; font-weight: 700; padding: 0 var(--s-3); cursor: pointer; }
.abox__row { display: flex; align-items: center; justify-content: space-between; gap: var(--s-4); padding: var(--s-4); flex-wrap: wrap; }
.abox__pitch { margin: 0; font-size: 13px; line-height: 1.5; color: var(--ink-600); max-width: 380px; }
.abox__armed { display: flex; align-items: center; justify-content: space-between; gap: var(--s-4); padding: var(--s-4); background: var(--green-100); }
.abox__armed b { font-family: var(--font-display); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.abox__armed b .icon { color: var(--green-700); display: flex; }
.abox .meta, .ab-exec .meta, .buy-modal .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); margin-top: 3px; }

/* --- Auto-buy page ------------------------------------------- */
.ab-cap { border: var(--bw) solid var(--ink-900); background: var(--paper); padding: var(--s-4) var(--s-5); margin-bottom: var(--s-5); }
.ab-cap__row { display: flex; align-items: baseline; justify-content: space-between; gap: var(--s-3); font-family: var(--font-mono); font-size: 12px; color: var(--ink-600); margin-bottom: 10px; }
.ab-cap__row b { color: var(--ink-900); font-weight: 800; }
.ab-cap__bar { height: 14px; border: 2px solid var(--ink-900); background: var(--canvas-2); }
.ab-cap__bar i { display: block; height: 100%; background: var(--green-500); border-right: 2px solid var(--ink-900); }

.abrow { display: grid; grid-template-columns: 64px minmax(0,1fr) 120px 120px 170px 44px; gap: var(--s-4); align-items: center; background: var(--paper); border: var(--bw) solid var(--ink-900); border-top: 0; padding: var(--s-3) var(--s-4); }
.abrow:first-child { border-top: var(--bw) solid var(--ink-900); }

<script type="text/babel" data-presets="react">
// ===========================================================
// Pricy.no Web Kit — Primitives & shared data
// ===========================================================
const { useState, useEffect, useRef } = React;

// --- NOK formatting: "1 499" with thin spaces ----------------
function fmt(n) { return n.toLocaleString('en-US').replace(/,/g, '\u00A0'); }

// --- Lucide icon wrapper -------------------------------------
function Icon({ name, size = 18, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const i = document.createElement('i');
      i.setAttribute('data-lucide', name);
      ref.current.appendChild(i);
      window.lucide.createIcons();
    }
  }, [name]);
  return <span className="icon" ref={ref} style={{ fontSize: size, ...style }} />;
}

// --- Price (currency + tabular number) -----------------------
function Price({ value, size = 22, cur = 'kr' }) {
  return (
    <span className="price">
      <span className="cur" style={{ fontSize: Math.round(size * 0.6) }}>{cur}</span>
      <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 800, fontSize: size, fontVariantNumeric: 'tabular-nums', letterSpacing: '-0.01em' }}>{fmt(value)}</span>
    </span>
  );
}

// --- Tag / badge --------------------------------------------
function Tag({ children, kind = '' }) {
  return <span className={'tag ' + (kind ? 'tag--' + kind : '')}>{children}</span>;
}

// --- Delta (price change) -----------------------------------
function Delta({ pct }) {
  const down = pct <= 0;
  return (
    <span className={'delta ' + (down ? 'delta--down' : 'delta--up')}>
      {down ? '▼' : '▲'} {Math.abs(pct)}%
    </span>
  );
}

// --- Button -------------------------------------------------
function Btn({ children, variant = '', size = '', icon, onClick, style, disabled }) {
  const cls = ['btn', variant && 'btn--' + variant, size && 'btn--' + size].filter(Boolean).join(' ');
  return (
    <button className={cls} onClick={onClick} style={style} disabled={disabled}>
      {icon && <Icon name={icon} size={16} />}{children}
    </button>
  );
}

// --- Sparkline (small inline price trend) -------------------
function Sparkline({ points, w = 120, h = 40, color = 'var(--ink-900)' }) {
  const max = Math.max(...points), min = Math.min(...points);
  const range = max - min || 1;
  const step = w / (points.length - 1);
  let d = '';
  points.forEach((p, i) => {
    const px = (i * step).toFixed(1), py = (h - ((p - min) / range) * h).toFixed(1);
    d += (i === 0 ? `M ${px} ${py}` : ` H ${px} V ${py}`);
  });
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none" preserveAspectRatio="none">
      <path d={d} stroke={color} strokeWidth="2.5" />
    </svg>
  );
}

// --- Price-history step chart -------------------------------
function HistoryChart({ points, low }) {
  const w = 560, h = 180, pad = 4;
  const max = Math.max(...points), min = Math.min(...points);
  const range = max - min || 1;
  const step = (w - pad * 2) / (points.length - 1);
  const x = i => pad + i * step;
  const y = v => pad + (h - pad * 2) - ((v - min) / range) * (h - pad * 2);
  let line = '';
  points.forEach((p, i) => { line += (i === 0 ? `M ${x(i)} ${y(p)}` : ` H ${x(i)} V ${y(p)}`); });
  const area = `${line} V ${h - pad} H ${x(0)} Z`;
  const lastIdx = points.length - 1;
  const [hi, setHi] = React.useState(null);
  const wrapRef = React.useRef(null);
  const track = e => {
    const r = wrapRef.current.getBoundingClientRect();
    const frac = (e.clientX - r.left) / r.width;
    setHi(Math.max(0, Math.min(lastIdx, Math.round(frac * lastIdx))));
  };
  const val = hi != null ? points[hi] : null;
  const leftPct = hi != null ? (x(hi) / w) * 100 : 0;
  const topPct = hi != null ? (y(val) / h) * 100 : 0;
  const weeksAgo = hi != null ? lastIdx - hi : 0;
  const whenLabel = weeksAgo === 0 ? 'today' : weeksAgo + (weeksAgo === 1 ? ' week ago' : ' weeks ago');
  const tipMod = leftPct > 78 ? ' chart__tip--left' : leftPct < 12 ? ' chart__tip--right' : '';
  return (
    <div className="chart__plot" ref={wrapRef} onMouseMove={track} onMouseLeave={() => setHi(null)}>
      <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
        <path d={area} fill="var(--green-100)" />
        <path d={line} stroke="var(--ink-900)" strokeWidth="2.5" fill="none" strokeLinecap="square" strokeLinejoin="miter" />
        <line x1={x(0)} y1={y(low)} x2={w - pad} y2={y(low)} stroke="var(--green-500)" strokeWidth="2" strokeDasharray="6 4" />
        <rect x={x(lastIdx) - 5} y={y(points[lastIdx]) - 5} width="10" height="10" fill="var(--green-500)" stroke="var(--ink-900)" strokeWidth="2" />
      </svg>
      {hi != null && (
        <React.Fragment>
          <div className="chart__cursor" style={{ left: leftPct + '%' }} />
          <div className="chart__dot" style={{ left: leftPct + '%', top: topPct + '%' }} />
          <div className={'chart__tip' + tipMod} style={{ left: leftPct + '%', top: topPct + '%' }}>
            <span className="chart__tip-price">kr {fmt(val)}</span>
            <span className="chart__tip-when">{whenLabel}</span>
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

// ===========================================================
// DATA — Norwegian shops + products
// ===========================================================
const SHOPS = ['Elkjøp', 'Power', 'Komplett', 'NetOnNet', 'Clas Ohlson', 'Proshop', 'CDON', 'Dustin'];

function hist(base, vol) {
  const pts = [];
  let v = base * 1.35;
  for (let i = 0; i < 24; i++) { v += (Math.sin(i * 0.9) * vol) + (Math.random() - 0.55) * vol; v = Math.max(base, v); pts.push(Math.round(v / 10) * 10); }
  pts[pts.length - 1] = base;
  return pts;
}

const PRODUCTS = [
  { id: 'airpods', name: 'AirPods Pro (2nd gen, USB-C)', brand: 'Apple', cat: 'Audio', icon: 'headphones', best: 2290, was: 2990, drop: 23, shops: 9 },
  { id: 'xm5', name: 'Sony WH-1000XM5 Wireless', brand: 'Sony', cat: 'Audio', icon: 'headphones', best: 2999, was: 4290, drop: 30, shops: 11 },
  { id: 'switch', name: 'Nintendo Switch OLED', brand: 'Nintendo', cat: 'Gaming', icon: 'gamepad-2', best: 3290, was: 3790, drop: 13, shops: 8 },
  { id: 'dyson', name: 'Dyson V15 Detect Absolute', brand: 'Dyson', cat: 'Home', icon: 'wind', best: 6490, was: 8990, drop: 28, shops: 7 },
  { id: 'iphone', name: 'iPhone 15 128GB', brand: 'Apple', cat: 'Phones', icon: 'smartphone', best: 9190, was: 9990, drop: 8, shops: 12 },
  { id: 'tv', name: 'Samsung 55" OLED S90C', brand: 'Samsung', cat: 'TV', icon: 'tv', best: 11990, was: 17990, drop: 33, shops: 6 },
  { id: 'kindle', name: 'Kindle Paperwhite 16GB', brand: 'Amazon', cat: 'E-readers', icon: 'book-open', best: 1690, was: 1990, drop: 15, shops: 5 },
  { id: 'lego', name: 'LEGO Icons Orchid 10311', brand: 'LEGO', cat: 'Toys', icon: 'blocks', best: 449, was: 599, drop: 25, shops: 10 },
];

// build offers + history per product
PRODUCTS.forEach(p => {
  p.offers = SHOPS.slice(0, Math.min(p.shops, SHOPS.length)).map((s, i) => ({
    shop: s,
    price: p.best + Math.round((i * (p.best * 0.04) + (i === 0 ? 0 : 50)) / 10) * 10,
    ship: i % 3 === 0 ? 'Free shipping' : 'kr 79 shipping',
    stock: i % 4 !== 3,
    eta: i % 2 === 0 ? 'In stock' : '2–4 days',
  })).sort((a, b) => a.price - b.price);
  p.offers[0].price = p.best;
  p.history = hist(p.best, p.best * 0.06);
});

const CATEGORIES = ['Audio', 'Phones', 'TV', 'Gaming', 'Home', 'Computers', 'Toys', 'Kitchen'];
const POPULAR = ['airpods pro', 'rtx 4070', 'robot vacuum', 'espresso machine', 'air fryer'];

Object.assign(window, { fmt, Icon, Price, Tag, Delta, Btn, Sparkline, HistoryChart, SHOPS, PRODUCTS, CATEGORIES, POPULAR });

</script>

function searchSuggest(q) {

            { label: 'Terms', route: 'about' },

        <div className="ftr__bot">
          <span>© 2026 pricy.no — Oslo, Norway</span>

}

Object.assign(window, { Header, Footer });

<script type="text/babel" data-presets="react">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
// Exports (to window): useTweaks, TweaksPanel, TweakSection, TweakRow, TweakSlider,
//   TweakToggle, TweakRadio, TweakSelect, TweakText, TweakNumber, TweakColor, TweakButton.

// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

//           <TweakSection label="Theme" />

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>

// animated count helper
function useCountTo(target, run, ms = 900) {
  const [n, setN] = useState(0);
  useEffect(() => {
    if (!run) { setN(0); return; }
    let raf, t0;
    const tick = (t) => {
      if (!t0) t0 = t;
      const p = Math.min(1, (t - t0) / ms);
      const e = 1 - Math.pow(1 - p, 3);
      setN(Math.round(target * e));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, run]);
  return n;
}

// Live mini price-demo used in the split brand panel
function BrandDemo() {
  const pts = byId.xm5.history;
  const saved = useCountTo(1291, true, 1100);
  return (
    <div className="demo">

          <span className="demo__price">kr 2 999</span>

        {(() => {
          const w = 280, h = 86, max = Math.max(...pts), min = Math.min(...pts), r = max - min || 1;
          const step = w / (pts.length - 1);
          let line = '';
          pts.forEach((p, i) => { const x = i * step, y = h - ((p - min) / r) * (h - 10) - 5; line += (i === 0 ? `M ${x} ${y}` : ` H ${x} V ${y}`); });
          const lastY = h - ((pts[pts.length - 1] - min) / r) * (h - 10) - 5;
          return (<>
            <path className="draw-line" d={line} stroke="#00B964" strokeWidth="2.5" fill="none" strokeLinecap="square" strokeLinejoin="miter" />
            <rect x={w - 4} y={lastY - 4} width="8" height="8" fill="#00B964" stroke="#161614" strokeWidth="2" />
          </>);

      </div>
    </div>

}

function AuthCard({ onAuthed, go }) {
  const [method, setMethod] = useState('password'); // password | magic
  const [mode, setMode] = useState('login'); // login | signup
  const [bidBusy, setBidBusy] = useState(false);
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [showPw, setShowPw] = useState(false);
  const [loading, setLoading] = useState(false);
  const [sent, setSent] = useState(false);
  const [err, setErr] = useState('');

  const validEmail = /.+@.+\..+/.test(email);

  // Hand the attempt to the parent and wait for the real answer.
  // - onAuthed returns a Promise (production shell): keep the spinner until it
  //   settles. Resolved `false`, or an object like `{ error: '…' }`, is a
  //   server-side rejection — stay on the form and show the message. A resolved
  //   truthy value means the parent is navigating; we just stop spinning.
  // - onAuthed returns undefined (the preview harness, which navigates by side
  //   effect): fall back to today's fake demo delay, then release.
  const runAuth = (setBusy, demoDelay, fallbackErr, ...args) => {
    setErr('');
    setBusy(true);
    const result = onAuthed(...args);
    if (result && typeof result.then === 'function') {
      Promise.resolve(result).then(
        (r) => {
          setBusy(false);
          if (r === false || (r && r.error)) setErr((r && r.error) || fallbackErr);
        },
        () => { setBusy(false); setErr(fallbackErr); }
      );
    } else {
      setTimeout(() => setBusy(false), demoDelay);
    }
  };

  const bankid = () => {
    if (bidBusy) return;
    runAuth(setBidBusy, 1400, 'BankID could not verify your identity — try again.', null);
  };

  const submit = (e) => {
    e.preventDefault();
    setErr('');
    if (!validEmail) { setErr('Enter a valid email address.'); return; }
    if (method === 'password' && pw.length < 1) { setErr('Enter your password.'); return; }
    if (method === 'password' && mode === 'signup' && pw.length < 8) { setErr('Password must be at least 8 characters.'); return; }
    if (method === 'magic') {
      // Sending the link is not an auth event — show the "check your inbox" screen.
      setLoading(true);
      setTimeout(() => { setLoading(false); setSent(true); }, 850);
      return;
    }
    if (mode === 'signup') runAuth(setLoading, 850, "Couldn't create your account — try again.", email, { signup: true, password: pw });
    else runAuth(setLoading, 850, 'No account for this email — create one?', email, { password: pw });
  };

  if (sent) {
    return (
      <div className="authcard">
        <div className="sent">
          <div className="sent__icon"><Icon name="mail-check" size={34} /></div>
          <h1>Check your inbox</h1>
          <p>We sent a one-tap login link to<br /><span className="addr">{email}</span></p>
          <Btn variant="primary" size="lg" style={{ width: '100%' }} icon={loading ? undefined : 'arrow-right'} disabled={loading} onClick={() => runAuth(setLoading, 850, "That link didn't work — request a new one.", email)}>{loading ? 'Opening…' : 'Open the link'}</Btn>
          <div className="auth-foot" style={{ marginTop: 20 }}>
            Wrong address? <a onClick={() => { setSent(false); setMethod('magic'); }}>Go back</a>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="authcard">
      <div className="authcard__eyebrow">{mode === 'signup' ? 'Get started' : 'Welcome back'}</div>
      <h1>{mode === 'signup' ? 'Create your account' : 'Log in to pricy'}</h1>

      <button type="button" className="bankid-btn" onClick={bankid} disabled={bidBusy}>
        {bidBusy
          ? <React.Fragment><span className="spinner" style={{ width: 16, height: 16, border: '2px solid currentColor', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 0.6s linear infinite' }}></span> Waiting for BankID…</React.Fragment>
          : <React.Fragment><Icon name="fingerprint" size={18} /> Continue with <BankIDMark light={true}></BankIDMark></React.Fragment>}
      </button>
      <div className="bankid-hint"><Icon name="zap" size={13} /> BankID unlocks auto-buy — pricy can purchase for you the moment a price drops below your max.</div>

      <div className="or-div"><span>or use email</span></div>

      <div className="seg" role="tablist">
        <button className={method === 'password' ? 'is-on' : ''} onClick={() => { setMethod('password'); setErr(''); }}>
          <Icon name="lock" size={14} /> Password
        </button>
        <button className={method === 'magic' ? 'is-on' : ''} onClick={() => { setMethod('magic'); setErr(''); }}>
          <Icon name="wand-sparkles" size={14} /> Magic link
        </button>
      </div>

      <form onSubmit={submit}>
        <div className="formfield">
          <label htmlFor="email">Email</label>
          <div className={'field' + (err && !validEmail ? ' is-invalid' : '')}>
            <span className="lead-ic"><Icon name="mail" size={18} /></span>
            <input id="email" type="email" autoComplete="email" placeholder="you@example.no"
              value={email} onChange={e => setEmail(e.target.value)} autoFocus />
          </div>
        </div>

        {method === 'password' && (
          <div className="formfield">
            <label htmlFor="pw">Password <span className="forgot" onClick={(e) => e.preventDefault()}>Forgot?</span></label>
            <div className={'field' + (err && validEmail ? ' is-invalid' : '')}>
              <span className="lead-ic"><Icon name="lock" size={18} /></span>
              <input id="pw" type={showPw ? 'text' : 'password'} autoComplete="current-password" placeholder="••••••••"
                value={pw} onChange={e => setPw(e.target.value)} />
              <button type="button" className="pw-toggle" onClick={() => setShowPw(s => !s)} aria-label="Toggle password">
                <Icon name={showPw ? 'eye-off' : 'eye'} size={18} />
              </button>
            </div>
          </div>
        )}

        {method === 'magic' && (
          <div className="formhint">No password needed — we'll email you a secure one-tap link that signs you in.</div>
        )}

        {err && <div className="formhint err"><Icon name="alert-triangle" size={13} style={{ verticalAlign: '-2px', marginRight: 4 }} />{err}</div>}

        <button type="submit" className="btn btn--primary auth-submit" disabled={loading}>
          {loading ? <span className="spinner" /> : (<>{method === 'magic' ? 'Send magic link' : (mode === 'signup' ? 'Create account' : 'Log in')}<Icon name="arrow-right" size={16} /></>)}
        </button>
      </form>

      <div className="auth-foot">
        {mode === 'signup'
          ? <React.Fragment>Already have an account? <a onClick={() => { setMode('login'); setErr(''); }}>Log in</a></React.Fragment>
          : <React.Fragment>New to pricy? <a onClick={() => { setMode('signup'); setErr(''); }}>Create an account</a></React.Fragment>}
      </div>
    </div>
  );
}

function DrawSpark({ points, w = 120, h = 36, color = 'var(--ink-900)', draw = true }) {
  const max = Math.max(...points), min = Math.min(...points), r = max - min || 1;
  const step = w / (points.length - 1);
  let d = '';
  points.forEach((p, i) => {
    const px = (i * step).toFixed(1), py = (h - ((p - min) / r) * (h - 6) - 3).toFixed(1);
    d += (i === 0 ? `M ${px} ${py}` : ` H ${px} V ${py}`);

  const lastY = h - ((points[points.length - 1] - min) / r) * (h - 6) - 3;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none" preserveAspectRatio="none" className={draw ? 'draw' : ''}>
      <path className={draw ? 'draw-line' : ''} d={d} stroke={color} strokeWidth="2.5" strokeLinecap="square" strokeLinejoin="miter" />

// ===========================================================

// ===========================================================

// ---- deterministic offer + history generators -------------
function _seed(n) { let x = Math.sin(n * 99.13) * 43758.5453; return x - Math.floor(x); }
function genOffers(p) {
  const n = Math.min(p.shops, SHOPS.length);
  const offers = SHOPS.slice(0, n).map((s, i) => ({
    shop: s,
    price: p.best + Math.round((i * (p.best * 0.035) + (i === 0 ? 0 : 40 + _seed(p.idn + i) * 120)) / 10) * 10,
    ship: i % 3 === 0 ? 'Free shipping' : 'kr 79 shipping',
    stock: i % 4 !== 3,
    eta: i % 2 === 0 ? 'In stock' : '2–4 days',
  })).sort((a, b) => a.price - b.price);
  offers[0].price = p.best;
  return offers;
}
function genHist(idn, base) {
  const vol = base * 0.06, pts = [];
  let v = base * 1.32;
  for (let i = 0; i < 24; i++) { v += Math.sin(i * 0.9) * vol + (_seed(idn * 7 + i) - 0.55) * vol; v = Math.max(base, v); pts.push(Math.round(v / 10) * 10); }
  pts[pts.length - 1] = base;
  return pts;
}

let _idn = 1;

  ...PRODUCTS.filter(p => _META[p.id]).map(p => ({ ...p, ...(_META[p.id]), stock: true, kw: (p.cat + ' ' + p.brand).toLowerCase() })),

    o.offers = genOffers(o);
    o.history = genHist(o.idn, o.best);
    return o;
  }),
];
const CAT_OF = {};
CATALOG.forEach(p => { (CAT_OF[p.cat] = CAT_OF[p.cat] || []).push(p); });
const ALL_BRANDS = (cat) => [...new Set(CATALOG.filter(p => !cat || p.cat === cat).map(p => p.brand))].sort();

  if (cat) return CATALOG.filter(p => p.cat === cat);
  const q = (query || '').toLowerCase().trim();
  if (!q) return CATALOG.slice();
  const toks = q.split(/\s+/).filter(t => t.length >= 2);

      <Dropdown label={baseSel.cat ? 'Category · ' + baseSel.cat : 'Category'} active={!!baseSel.cat}>
        {CATEGORIES.filter(c => CAT_OF[c]).map(c => (
          <div key={c} className={'fmenu__item' + (baseSel.cat === c ? ' is-on' : '')} onClick={() => go('results', { cat: c })}>
            <Icon name={CAT_ICONS[c] || 'tag'} size={15} /><span>{c}</span><span className="ct">{CAT_OF[c].length}</span>
          </div>
        ))}
      </Dropdown>
      <Dropdown label={f.brands.length ? 'Brand · ' + f.brands.length : 'Brand'} active={!!f.brands.length}>
        {brands.map(b => <Check key={b} on={f.brands.includes(b)} label={b} count={base.byBrand[b] || 0} onClick={() => setBrand(b)} />)}
      </Dropdown>
      <Dropdown label={(f.min || f.max) ? 'Price · set' : 'Price'} active={!!(f.min || f.max)}>
        <div style={{ padding: '4px 2px', minWidth: 200 }}>
          <div className="pricefields">
            <input type="number" placeholder={String(base.min)} value={f.min} onChange={e => set('min', e.target.value)} />
            <span className="pricefields__d">–</span>
            <input type="number" placeholder={String(base.max)} value={f.max} onChange={e => set('max', e.target.value)} />
          </div>
          <input className="range" type="range" min={base.min} max={base.max} value={f.max || base.max} onChange={e => set('max', e.target.value)} />
        </div>
      </Dropdown>
      <Dropdown label={f.rating ? 'Rating · ' + f.rating + '+' : 'Rating'} active={!!f.rating}>
        {[4.5, 4, 3.5].map(r => (
          <div key={r} className={'fmenu__item' + (f.rating === r ? ' is-on' : '')} onClick={() => set('rating', f.rating === r ? 0 : r)}>
            <span className="ropt__stars">{'★★★★★'.slice(0, Math.round(r))}<span className="stars__off">{'★★★★★'.slice(Math.round(r))}</span></span><span>{r.toFixed(1)} & up</span>
          </div>
        ))}

      <button className={'fpill' + (f.nc ? ' is-on' : '')} onClick={() => set('nc', !f.nc)}>Noise cancelling</button>
    </div>
  );
}

const SORTS = [
  { id: 'best', label: 'Best price', fn: (a, b) => a.best - b.best },
  { id: 'drop', label: 'Biggest drop', fn: (a, b) => b.drop - a.drop },
  { id: 'shops', label: 'Most shops', fn: (a, b) => b.shops - a.shops },
  { id: 'rating', label: 'Top rated', fn: (a, b) => b.rating - a.rating },
];

// ===========================================================
// RESULTS SCREEN
// ===========================================================
function Results({ go, query, cat, view = 'list', filterLayout = 'rail', density = 'comfy', sparklines = true }) {
  const baseSel = { query, cat };
  const baseResults = useMemo(() => searchCatalog(baseSel), [query, cat]);
  const [sort, setSort] = useState('best');
  const [f, setF] = useState({ brands: [], min: '', max: '', rating: 0, sale: false, instock: false, nc: false });
  const [saved, setSaved] = useState({});
  // reset filters when the search changes
  useEffect(() => { setF({ brands: [], min: '', max: '', rating: 0, sale: false, instock: false, nc: false }); }, [query, cat]);
  const set = (k, v) => setF(prev => ({ ...prev, [k]: v }));
  const onSave = (id) => setSaved(s => ({ ...s, [id]: !s[id] }));

  const prices = baseResults.map(p => p.best);
  const base = {
    min: prices.length ? Math.floor(Math.min(...prices) / 100) * 100 : 0,
    max: prices.length ? Math.ceil(Math.max(...prices) / 100) * 100 : 1000,
    cat,
    byBrand: baseResults.reduce((m, p) => ((m[p.brand] = (m[p.brand] || 0) + 1), m), {}),
  };
  base.brands = Object.keys(base.byBrand).sort();

  let list = baseResults.filter(p => {
    if (f.brands.length && !f.brands.includes(p.brand)) return false;
    if (f.min && p.best < +f.min) return false;
    if (f.max && p.best > +f.max) return false;
    if (f.rating && p.rating < f.rating) return false;
    if (f.sale && p.drop < 12) return false;
    if (f.instock && !p.stock) return false;
    if (f.nc && !p.nc) return false;
    return true;
  });
  list = list.slice().sort((SORTS.find(s => s.id === sort) || SORTS[0]).fn);

  const title = cat ? cat : query ? <>Results for <span className="q">“{query}”</span></> : 'All products';
  const activeChips = [
    ...f.brands.map(b => ({ k: 'brand:' + b, label: b, clear: () => set('brands', f.brands.filter(x => x !== b)) })),
    ...(f.min ? [{ k: 'min', label: 'min kr ' + fmt(+f.min), clear: () => set('min', '') }] : []),
    ...(f.max ? [{ k: 'max', label: 'max kr ' + fmt(+f.max), clear: () => set('max', '') }] : []),
    ...(f.rating ? [{ k: 'rating', label: f.rating + '★ & up', clear: () => set('rating', 0) }] : []),
    ...(f.sale ? [{ k: 'sale', label: 'On sale', clear: () => set('sale', false) }] : []),
    ...(f.instock ? [{ k: 'instock', label: 'In stock', clear: () => set('instock', false) }] : []),
    ...(f.nc ? [{ k: 'nc', label: 'Noise cancelling', clear: () => set('nc', false) }] : []),
  ];

  return (
    <div className="screen">
      <AppHeader go={go} onLogout={() => go('landing')} query={query || ''} />
      <div className={'page results' + (filterLayout === 'topbar' ? ' results--topbar' : '') + (density === 'compact' ? ' is-compact' : '') + (view === 'grid' ? ' is-grid' : '')}>
        {filterLayout === 'rail' && (
          <aside className="filters">
            <FiltersBody f={f} set={set} base={base} go={go} />
          </aside>
        )}
        <main className="results__main">
          {filterLayout === 'topbar' && <FilterBar f={f} set={set} base={base} go={go} baseSel={baseSel} />}
          <div className="results__title">
            <h1>{title}</h1>
          </div>
          <div className="results__bar">
            <div className="count">{list.length} {list.length === 1 ? 'product' : 'products'} · {list.reduce((n, p) => n + p.shops, 0)} offers tracked</div>
            <div className="results__sort">
              <span className="results__sortlbl">Sort</span>
              <div className="sortbar">
                {SORTS.map(s => <button key={s.id} className={sort === s.id ? 'is-on' : ''} onClick={() => setSort(s.id)}>{s.label}</button>)}
              </div>
            </div>
          </div>
          {activeChips.length > 0 && (
            <div className="activechips">
              {activeChips.map(c => (
                <button key={c.k} className="fchip" onClick={c.clear}>{c.label}<Icon name="x" size={12} /></button>
              ))}
              <button className="fchip fchip--clear" onClick={() => setF({ brands: [], min: '', max: '', rating: 0, sale: false, instock: false, nc: false })}>Clear all</button>
            </div>
          )}

          {list.length === 0 ? (
            <div className="empty">
              <div className="empty__ic"><Icon name="search-x" size={40} /></div>
              <h2>No products match those filters</h2>
              <p>Try widening your price range or clearing a filter.</p>
              <Btn variant="primary" onClick={() => setF({ brands: [], min: '', max: '', rating: 0, sale: false, instock: false, nc: false })}>Clear filters</Btn>
            </div>
          ) : view === 'grid' ? (
            <div className="pgrid">
              {list.map(p => <ResultCard key={p.id} p={p} go={go} />)}
            </div>
          ) : (
            <div className="rlist">
              {list.map(p => <ResultRow key={p.id} p={p} go={go} spark={sparklines} saved={saved[p.id]} onSave={onSave} />)}
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

            <div className="bestbox">

                  <div className="label">Best price · {best.shop}</div>
                  <div className="bestbox__price"><span className="cur">kr</span><span className="t-price-lg">{fmt(best.price)}</span></div>
                </div>
                <Btn variant="dark" icon="external-link">Go to shop</Btn>
              </div>
              <div className="bestbox__bot">

          </div>
        </div>

        <div className="pdp__grid">
          <div className="offers">
            <div className="offers__h"><span>Shop</span><span>Delivery</span><span>Stock</span><span style={{ textAlign: 'right' }}>Price</span></div>
            {p.offers.map((o, i) => (
              <div key={o.shop} className={'orow' + (i === 0 ? ' is-best' : '')}>
                <div className="orow__shop">{o.shop}{i === 0 && <Tag kind="best">★ Best</Tag>}</div>

            ))}
          </div>

          <div className="chart">
            <div className="chart__head">
              <h3 style={{ margin: 0, fontSize: 16 }}>Price history · {weeks} weeks</h3>
              <div className="chart__ranges" role="group" aria-label="Time scale">
                {RANGES.map(r => (
                  <button key={r.w} type="button" className={weeks === r.w ? 'is-active' : ''} aria-pressed={weeks === r.w} onClick={() => setWeeks(r.w)}>{r.label}</button>

        <div className="sec" style={{ marginTop: 'var(--s-7)' }}>
          <div className="sec__head"><h2>More in {p.cat}</h2><span className="more" onClick={() => go('results', { cat: p.cat })}>See all <Icon name="arrow-right" size={14} /></span></div>

            {more.map(x => <ResultCard key={x.id} p={x} go={go} />)}

Object.assign(window, { CATALOG, getListing, searchCatalog, Results, ProductPage, ResultRow, ResultCard, Stars });

<script type="text/babel" data-presets="react">
// ===========================================================
// Pricy.no — Shared page infrastructure
// WatchStore (shared watch/alert state) + Plus paywall bits
// Loaded before the page scripts; exports to window.
// ===========================================================

// --- WatchStore: single source of truth for watched products
const WatchStore = {
  items: WATCHED.map(w => ({ id: w.id, target: w.target, paused: false, hit: w.hit })),
  ls: new Set(),
  emit() { this.items = [...this.items]; this.ls.forEach(f => f()); },
  sub(f) { this.ls.add(f); return () => this.ls.delete(f); },
  prod(id) { return (window.byId && byId[id]) || (window.CATALOG || []).find(p => p.id === id) || (window.PRODUCTS || []).find(p => p.id === id); },
  get(id) { return this.items.find(w => w.id === id); },
  has(id) { return this.items.some(w => w.id === id); },
  add(id, target) {
    if (this.has(id)) return;
    const p = this.prod(id);
    this.items = [{ id, target, paused: false, hit: p ? p.best <= target : false }, ...this.items];
    this.emit();
  },
  remove(id) { this.items = this.items.filter(w => w.id !== id); this.emit(); },
  toggle(id, target) { this.has(id) ? this.remove(id) : this.add(id, target); },
  setTarget(id, target) {
    const w = this.get(id); if (!w) return;
    const p = this.prod(id);
    w.target = target; w.hit = p ? p.best <= target : false;
    this.emit();
  },
  setPaused(id, v) { const w = this.get(id); if (!w) return; w.paused = v; this.emit(); },
};

<script type="text/babel" data-presets="react">

const AutobuyStore = {
  signed: true,
  signedAt: '11 Jul 2026, 09:12',
  payment: 'vipps', // vipps | card
  cap: 20000,
  orders: [
    { id: 'tv',    max: 12500, expires: '9 Oct 2026', shops: 'Any shop', status: 'executed',
      exec: { shop: 'NetOnNet', price: 11990, at: 'Today, 09:41', ref: 'PY-8841-2207', angrerett: '25 Jul 2026' } },
    { id: 'xm5',   max: 2800, expires: '10 Aug 2026', shops: 'Any shop', status: 'active' },
    { id: 'dyson', max: 5990, expires: '9 Sep 2026',  shops: 'Excl. marketplaces', status: 'active' },
  ],
  ls: new Set(),
  sub(fn) { this.ls.add(fn); return () => this.ls.delete(fn); },
  emit() { this.ls.forEach(fn => fn()); },
  prod(id) { return getListing(id) || byId[id]; },
  capUsed() { return this.orders.filter(o => o.status === 'executed').reduce((s, o) => s + o.exec.price, 0); },
  sign() { this.signed = true; this.signedAt = '11 Jul 2026, ' + new Date().toTimeString().slice(0, 5); this.emit(); },
  revoke() { this.signed = false; this.orders = this.orders.filter(o => o.status === 'executed'); this.emit(); },
  add(id, max, expires, shops) {
    this.orders = [...this.orders.filter(o => !(o.id === id && o.status === 'active')), { id, max, expires, shops, status: 'active' }];
    this.emit();
  },
  cancel(id) { this.orders = this.orders.filter(o => !(o.id === id && o.status === 'active')); this.emit(); },
  has(id) { return this.orders.find(o => o.id === id && o.status === 'active'); },
  execute(id) {
    const o = this.orders.find(x => x.id === id && x.status === 'active');
    if (!o) return null;
    o.status = 'executed';
    o.exec = { shop: 'Power', price: o.max - 190, at: 'Just now', ref: 'PY-' + Math.floor(1000 + Math.random() * 9000) + '-1107', angrerett: '25 Jul 2026' };
    this.emit();
    return o;
  },
};

            <div className="modal__head"><b>Revoke fullmakt?</b><button className="iconbtn" onClick={() => setConfirmRevoke(false)} aria-label="Close"><Icon name="x" size={16} /></button></div>

              <p style={{ margin: '0 0 var(--s-4)', fontSize: 14, lineHeight: 1.55 }}>Takes effect immediately. Your {active.length} armed order{active.length === 1 ? '' : 's'} will be cancelled and pricy can no longer purchase in your name. Completed purchases are unaffected.</p>

});

<script type="text/babel" data-presets="react">
// ===========================================================
// Pricy.no — Alerts / Watchlist page (signed in)
// Tabs: Watching (manage list) · Activity (alert feed)
// ===========================================================

function AlertRow({ r, go, onRemove }) {
  const [edit, setEdit] = useState(false);
  const [v, setV] = useState(r.target);
  const save = () => { const n = +v; if (n > 0) WatchStore.setTarget(r.id, n); setEdit(false); };
  const p = r.p;
  const active = r.hit && !r.paused;
  return (
    <div className={'alrow' + (active ? ' is-hit' : '') + (r.paused ? ' is-paused' : '')}>
      {active && <span className="wrow__flag"></span>}
      <div className="wrow__img"><Icon name={p.icon} size={24} /></div>
      <div style={{ minWidth: 0 }}>
        <div className="alrow__name" onClick={() => go('product', { id: p.id })}>{p.name}</div>
        <div className="alrow__meta">
          <span>{p.brand}</span><span>{p.shops} shops</span>
          {active && <span className="tag tag--best" style={{ fontSize: 9 }}>Below target</span>}
          {r.paused && <span className="tag" style={{ fontSize: 9 }}>Paused</span>}
        </div>
      </div>
      <div className="alrow__spark"><Sparkline points={p.history.slice(-12)} w={110} h={34} color={active ? 'var(--green-700)' : 'var(--ink-900)'} /></div>
      <div>
        <div className="alrow__lbl">Best now</div>
        <Price value={p.best} size={17}></Price>
      </div>
      <div className="alrow__tgtcol">
        <div className="alrow__lbl">Your target</div>
        {edit ? (
          <span className="tgt-edit">
            <span className="cur">kr</span>
            <input type="number" autoFocus value={v} onChange={e => setV(e.target.value)} onKeyDown={e => e.key === 'Enter' && save()} />
            <button onClick={save} aria-label="Save target"><Icon name="check" size={14} /></button>
          </span>
        ) : (
          <button className="tgt-btn" onClick={() => { setV(r.target); setEdit(true); }}>
            kr {fmt(r.target)} <Icon name="pencil" size={12} />
          </button>
        )}
      </div>
      <div className="alrow__act">
        <button className="iconbtn" title={r.paused ? 'Resume alerts' : 'Pause alerts'} onClick={() => WatchStore.setPaused(r.id, !r.paused)}>
          <Icon name={r.paused ? 'play' : 'pause'} size={16} />
        </button>
        <button className="iconbtn danger" title="Stop watching" onClick={() => onRemove ? onRemove(r) : WatchStore.remove(r.id)}>
          <Icon name="trash-2" size={16} />
        </button>
      </div>
    </div>
  );
}

function ActivityFeed({ go }) {
  return (
    <div className="actfeed">
      {FEED.map((f, i) => (
        <div key={i} className="actrow" onClick={() => go('product', { id: f.id })}>
          <div className={'actrow__dot ' + f.kind}>
            <Icon name={f.kind === 'up' ? 'trending-up' : f.kind === 'watch' ? 'eye' : 'trending-down'} size={17} />
          </div>
          <div style={{ minWidth: 0 }}>
            <div className="actrow__txt"><b>{f.title}</b> {f.text}</div>
            <div className="actrow__meta">
              <Tag kind={f.kind === 'up' ? 'up' : f.kind === 'watch' ? 'watch' : 'down'}>{f.tag}</Tag>
              <span>{f.time}</span>
            </div>
          </div>
          <div className="actrow__price">
            <span className="from">kr {fmt(f.from)}</span>
            <span className="to" style={{ color: f.kind === 'up' ? 'var(--up-600)' : 'var(--green-700)' }}>kr {fmt(f.to)}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function AlertsPage({ go, tab: tab0 }) {
  const watches = useWatchStore();
  const plan = usePlan();
  const [tab, setTab] = useState(tab0 === 'activity' ? 'activity' : 'watching');
  const [removed, setRemoved] = useState(null); // {id, target} for undo
  const [paywall, setPaywall] = useState(false);
  const rows = watches.map(w => ({ ...w, p: WatchStore.prod(w.id) })).filter(r => r.p);
  const hits = rows.filter(r => r.hit && !r.paused).length;

  const remove = (r) => { setRemoved({ id: r.id, target: r.target, name: r.p.name }); WatchStore.remove(r.id); };

  return (
    <div className="screen" data-screen-label="Alerts & watchlist">
      <AppHeader go={go} active="alerts" onLogout={() => go('landing')} />
      <div className="page al">
        <div className="al__head">
          <div>
            <h1>Watchlist &amp; alerts</h1>
            <div className="sub">{rows.length} watched · {hits} below target · kr {fmt(TOTAL_SAVED)} saved since March</div>
          </div>
          <Btn variant="primary" icon="plus" onClick={() => go('browse')}>Watch a product</Btn>
        </div>

        <div className="seg" role="tablist">
          <button className={tab === 'watching' ? 'is-on' : ''} onClick={() => setTab('watching')}>
            <Icon name="bookmark" size={14} /> Watching {hits > 0 && <span className="n">{hits}</span>}
          </button>
          <button className={tab === 'activity' ? 'is-on' : ''} onClick={() => setTab('activity')}>
            <Icon name="bell-ring" size={14} /> Activity
          </button>
        </div>

        {tab === 'watching' ? (
          <React.Fragment>
            {removed && (
              <div className="undo-bar">
                <span>Stopped watching <b>{removed.name}</b></span>
                <a onClick={() => { WatchStore.add(removed.id, removed.target); setRemoved(null); }}>Undo</a>
              </div>
            )}
            {rows.length === 0 ? (
              <div className="empty">
                <div className="empty__ic"><Icon name="bookmark-x" size={40} /></div>
                <h2>You're not watching anything</h2>
                <p>Find a product and set a target price — we'll ping you when it drops.</p>
                <Btn variant="primary" icon="search" onClick={() => go('browse')}>Browse categories</Btn>
              </div>
            ) : (
              <div className="watchlist">
                {rows.map(r => <AlertRow key={r.id} r={r} go={go} onRemove={remove} />)}
              </div>
            )}
            <div style={{ marginTop: 'var(--s-5)' }}>
              {plan === 'plus' ? (
                <div className="lockcard" style={{ cursor: 'default' }}>
                  <div className="lockcard__ic"><Icon name="sparkles" size={20} /></div>
                  <div>
                    <b>Price forecast <PlusTag></PlusTag></b>
                    <p>Sony WH-1000XM5 is likely to drop another 4–6% before Black Week. Samsung OLED is at its floor — buy now.</p>
                  </div>
                </div>
              ) : (
                <LockedCard icon="sparkles" title="Price forecast" desc="Know whether to buy now or wait — AI prediction per watched product." onOpen={() => setPaywall(true)} />
              )}
            </div>
          </React.Fragment>
        ) : (
          <ActivityFeed go={go} />
        )}
      </div>
      {paywall && <PlusModal onClose={() => setPaywall(false)} go={go} />}
    </div>
  );
}

Object.assign(window, { AlertsPage, ActivityFeed });

</script>

<script type="text/babel" data-presets="react">
// ===========================================================
// Pricy.no — Account & settings (signed in)
// Sections: Profile · Notifications · Plan & billing · Privacy
// ===========================================================

const ACCT_SECTIONS = [
  { id: 'profile',       label: 'Profile',        icon: 'user' },
  { id: 'notifications', label: 'Notifications',  icon: 'bell' },
  { id: 'plan',          label: 'Plan & billing', icon: 'sparkles' },
  { id: 'privacy',       label: 'Privacy & data', icon: 'shield' },
];

function AcctField({ label, value, onChange, type = 'text' }) {
  return (
    <div className="formfield" style={{ marginBottom: 'var(--s-4)' }}>
      <label>{label}</label>
      <div className="field" style={{ height: 46, boxShadow: 'none' }}>
        <input type={type} value={value} onChange={e => onChange(e.target.value)} style={{ padding: '0 14px' }} />
      </div>
    </div>
  );
}

function ChangePasswordForm({ hasPassword, onChangePassword, onDone, onToast }) {
  const [current, setCurrent] = useState('');
  const [next, setNext] = useState('');
  const [err, setErr] = useState('');
  const [saving, setSaving] = useState(false);
  const submit = (e) => {
    e.preventDefault();
    setErr('');
    setSaving(true);
    Promise.resolve(onChangePassword(current, next))
      .then(() => { onToast(hasPassword ? 'Password changed' : 'Password set'); onDone(); })
      .catch(e => setErr(e.message || 'Could not change password'))
      .finally(() => setSaving(false));
  };
  return (
    <form onSubmit={submit} style={{ marginTop: 'var(--s-4)', paddingTop: 'var(--s-4)', borderTop: '1px solid var(--ink-100)' }}>
      {hasPassword && <AcctField label="Current password" value={current} onChange={setCurrent} type="password" />}
      <AcctField label="New password" value={next} onChange={setNext} type="password" />
      {err && <div className="formhint err"><Icon name="alert-triangle" size={13} style={{ verticalAlign: '-2px', marginRight: 4 }} />{err}</div>}
      <div style={{ display: 'flex', gap: 'var(--s-3)', justifyContent: 'flex-end' }}>
        <button type="button" className="btn btn--ghost" onClick={onDone}>Cancel</button>
        <button type="submit" className="btn btn--primary" disabled={saving}><Icon name="check" size={16} /> {hasPassword ? 'Update password' : 'Set password'}</button>
      </div>
    </form>
  );
}

function ProfileSection({ onToast, initialName, onSave, hasPassword, onChangePassword }) {
  const [name, setName] = useState(initialName || (USER.name + ' Hansen'));
  const [email, setEmail] = useState(USER.email);
  const [dirty, setDirty] = useState(false);
  const [saving, setSaving] = useState(false);
  const [changingPw, setChangingPw] = useState(false);
  const set = (fn) => (v) => { fn(v); setDirty(true); };
  const save = () => {
    setSaving(true);
    Promise.resolve(onSave ? onSave(name) : null)
      .then(() => { setDirty(false); onToast('Profile saved'); })
      .catch(() => onToast('Could not save profile'))
      .finally(() => setSaving(false));
  };
  return (
    <div className="asec">
      <div className="asec__head"><h2>Profile</h2><span className="hint">Member since March 2026</span></div>
      <div className="asec__body">
        <div style={{ display: 'flex', gap: 'var(--s-5)', alignItems: 'flex-start', marginBottom: 'var(--s-4)' }}>
          <div className="avatar" style={{ width: 64, height: 64, fontSize: 22 }}>{USER.initials}</div>
          <div style={{ flex: 1 }}>
            <AcctField label="Full name" value={name} onChange={set(setName)} />
            <AcctField label="Email" value={email} onChange={set(setEmail)} type="email" />
          </div>
        </div>
        <div style={{ display: 'flex', gap: 'var(--s-3)', justifyContent: 'flex-end' }}>
          {!changingPw && <Btn variant="ghost" icon="key-round" onClick={() => setChangingPw(true)}>{hasPassword ? 'Change password' : 'Set password'}</Btn>}
          <Btn variant={dirty ? 'primary' : ''} icon="check" disabled={saving} onClick={save}>Save changes</Btn>
        </div>
        {changingPw && (
          <ChangePasswordForm
            hasPassword={hasPassword}
            onChangePassword={onChangePassword}
            onToast={onToast}
            onDone={() => setChangingPw(false)}
          />
        )}
      </div>
    </div>
  );
}

function NotifSection({ onToast, openPaywall, initial, onSave }) {
  const plan = usePlan();
  const [n, setN] = useState({ email: true, push: false, hits: true, lows: true, weekly: false, digest: 'instant', threshold: 'any', ...initial });
  const set = (k, v) => {
    const next = { ...n, [k]: v };
    setN(next);
    Promise.resolve(onSave ? onSave(next) : null)
      .then(() => onToast('Preference saved'))
      .catch(() => onToast('Could not save preference'));
  };
  const chip = (k, val, label) => (
    <a className={'cchip' + (n[k] === val ? ' is-on' : '')} onClick={() => set(k, val)}>{label}</a>
  );
  return (
    <React.Fragment>
      <div className="asec">
        <div className="asec__head"><h2>Channels</h2></div>
        <div className="arow">
          <div className="arow__txt"><b>Email alerts</b><p>Price drops and target hits, sent to {USER.email}.</p></div>
          <Toggle on={n.email} onChange={v => set('email', v)}></Toggle>
        </div>
        <div className="arow">
          <div className="arow__txt"><b>Push notifications</b><p>Instant alerts in your browser or on your phone.</p></div>
          <Toggle on={n.push} onChange={v => set('push', v)}></Toggle>
        </div>
        <div className="arow">
          <div className="arow__txt"><b>Weekly summary</b><p>Every Monday: what your watched products did last week.</p></div>
          <Toggle on={n.weekly} onChange={v => set('weekly', v)}></Toggle>
        </div>
        <div className={'arow' + (plan === 'plus' ? '' : ' is-locked')}>
          <div className="arow__txt">
            <b>AI deal digest <PlusTag></PlusTag></b>
            <p>A short daily read on your watchlist: what to grab, what to wait for.</p>
          </div>
          {plan === 'plus'
            ? <Toggle on={n.hits} onChange={v => set('hits', v)}></Toggle>
            : <Btn size="sm" icon="lock" onClick={openPaywall}>Unlock</Btn>}
        </div>
      </div>

      <div className="asec">
        <div className="asec__head"><h2>When to alert</h2></div>
        <div className="arow">
          <div className="arow__txt"><b>Timing</b><p>How fast should we tell you about a drop?</p></div>
          <div className="chipset">{chip('digest', 'instant', 'Instantly')}{chip('digest', 'daily', 'Daily digest')}{chip('digest', 'weekly', 'Weekly')}</div>
        </div>
        <div className="arow">
          <div className="arow__txt"><b>Minimum drop</b><p>Ignore noise below this size.</p></div>
          <div className="chipset">{chip('threshold', 'any', 'Any drop')}{chip('threshold', '5', 'Over 5%')}{chip('threshold', '10', 'Over 10%')}</div>
        </div>
        <div className="arow">
          <div className="arow__txt"><b>All-time lows</b><p>Always alert when a watched product hits its lowest price ever.</p></div>
          <Toggle on={n.lows} onChange={v => set('lows', v)}></Toggle>
        </div>
      </div>
    </React.Fragment>
  );
}

function PlanSection({ openPaywall, onToast }) {
  const plan = usePlan();
  const isPlus = plan === 'plus';
  return (
    <React.Fragment>
      <div className="asec">
        <div className="asec__head"><h2>Your plan</h2></div>
        <div className="asec__body">
          <div className={'planbox' + (isPlus ? ' is-plus' : '')}>
            <div>
              <div className="planbox__name">Current plan</div>
              <h3>{isPlus ? 'Pricy Plus' : 'Free'}</h3>
            </div>
            <div className="spacer"></div>
            {isPlus ? (
              <React.Fragment>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--green-300)' }}>kr 49/mo · renews Aug 1</span>
                <Btn variant="ghost" style={{ color: 'var(--paper)' }} onClick={() => { window.setPlan && window.setPlan('free'); onToast('Subscription cancelled'); }}>Cancel</Btn>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <span style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--ink-600)' }}>10 watches · standard alerts</span>
                <Btn variant="primary" icon="sparkles" onClick={openPaywall}>Upgrade to Plus</Btn>
              </React.Fragment>
            )}
          </div>
        </div>
        {PLUS_FEATURES.map(f => (
          <div key={f.name} className={'arow' + (isPlus ? '' : ' is-locked')}>
            <div className="arow__txt">
              <b><Icon name={f.icon} size={15} /> {f.name} <PlusTag></PlusTag></b>
              <p>{f.desc}</p>
            </div>
            {isPlus
              ? <span className="tag tag--best">Active</span>
              : <span style={{ color: 'var(--ink-400)', display: 'flex' }}><Icon name="lock" size={16} /></span>}
          </div>
        ))}
      </div>
    </React.Fragment>
  );
}

function PrivacySection({ onToast, go, initialMarketing, onSaveMarketing }) {
  const [marketing, setMarketing] = useState(!!initialMarketing);
  const [confirm, setConfirm] = useState(false);
  const set = (v) => {
    setMarketing(v);
    Promise.resolve(onSaveMarketing ? onSaveMarketing(v) : null)
      .then(() => onToast('Preference saved'))
      .catch(() => onToast('Could not save preference'));
  };
  return (
    <React.Fragment>
      <div className="asec">
        <div className="asec__head"><h2>Privacy &amp; data</h2></div>
        <div className="arow">
          <div className="arow__txt"><b>Marketing emails</b><p>Occasional product news from pricy. Never from shops — we don't share your data.</p></div>
          <Toggle on={marketing} onChange={set}></Toggle>
        </div>
        <div className="arow">
          <div className="arow__txt"><b>Export my data</b><p>Watchlist, alert history and settings as JSON.</p></div>
          <Btn size="sm" icon="download" onClick={() => onToast('Export sent to ' + USER.email)}>Export</Btn>
        </div>
      </div>
      <div className="asec asec--danger">
        <div className="asec__head"><h2>Danger zone</h2></div>
        <div className="arow">
          <div className="arow__txt"><b>Delete account</b><p>{confirm ? 'Are you sure? This deletes your watchlist and history permanently.' : 'Permanently delete your account and all data.'}</p></div>
          {confirm ? (
            <div style={{ display: 'flex', gap: 8 }}>
              <Btn size="sm" onClick={() => setConfirm(false)}>Keep account</Btn>
              <Btn size="sm" variant="dark" style={{ background: 'var(--up-600)', borderColor: 'var(--up-600)' }} onClick={() => go('landing')}>Yes, delete</Btn>
            </div>
          ) : (
            <Btn size="sm" icon="trash-2" onClick={() => setConfirm(true)}>Delete…</Btn>
          )}
        </div>
      </div>
    </React.Fragment>
  );
}

function AccountPage({ go, tab: tab0, me, onSaveProfile, onSaveSettings, onChangePassword }) {
  const [tab, setTab] = useState(ACCT_SECTIONS.some(s => s.id === tab0) ? tab0 : 'profile');
  const [toast, setToast] = useState('');
  const [paywall, setPaywall] = useState(false);
  const tRef = useRef(null);
  const onToast = (msg) => { setToast(msg); clearTimeout(tRef.current); tRef.current = setTimeout(() => setToast(''), 2200); };
  const openPaywall = () => setPaywall(true);
  const settings = (me && me.settings) || {};
  return (
    <div className="screen" data-screen-label="Account & settings">
      <AppHeader go={go} active="account" onLogout={() => go('landing')} />
      <div className="page acct">
        <h1>Account</h1>
        <div className="acct__grid">
          <nav className="acct__nav">
            {ACCT_SECTIONS.map(s => (
              <a key={s.id} className={tab === s.id ? 'is-on' : ''} onClick={() => setTab(s.id)}>
                <Icon name={s.icon} size={15} /> {s.label}
              </a>
            ))}
          </nav>
          <div>
            {tab === 'profile' && <ProfileSection onToast={onToast} initialName={me && me.user && me.user.name} onSave={onSaveProfile} hasPassword={me && me.user && me.user.hasPassword} onChangePassword={onChangePassword} />}
            {tab === 'notifications' && <NotifSection onToast={onToast} openPaywall={openPaywall} initial={settings} onSave={onSaveSettings} />}
            {tab === 'plan' && <PlanSection openPaywall={openPaywall} onToast={onToast} />}
            {tab === 'privacy' && <PrivacySection onToast={onToast} go={go} initialMarketing={settings.marketing} onSaveMarketing={onSaveSettings ? (v) => onSaveSettings({ marketing: v }) : undefined} />}
          </div>
        </div>
      </div>
      {toast && <Toast>{toast}</Toast>}
      {paywall && <PlusModal onClose={() => setPaywall(false)} go={go} />}
    </div>
  );
}

Object.assign(window, { AccountPage });

</script>
