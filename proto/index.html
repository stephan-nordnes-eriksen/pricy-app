<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>pricy.no — Index &amp; Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>

/* ===== colors_and_type.css ===== */
/* ============================================================
   PRICY.NO — DESIGN SYSTEM FOUNDATIONS
   Brutalist / minimal. Clear typography, signal-green savings.
   ------------------------------------------------------------
   Fonts are Google Fonts (no local files shipped — see README).
   Load in HTML <head> alongside this file:
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap');

:root {
  /* ---- FONT FAMILIES ------------------------------------- */
  --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-ui:      'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ---- INK (text + borders) ------------------------------ */
  --ink-900: #0E0E0E;   /* primary text, heavy borders, the "black" */
  --ink-700: #2E2E2C;   /* strong body */
  --ink-600: #5C5C57;   /* secondary text */
  --ink-400: #908F87;   /* tertiary / placeholder / disabled */
  --ink-300: #C7C5BC;   /* hairlines on canvas */

  /* ---- PAPER / SURFACE ----------------------------------- */
  --paper:    #FFFFFF;  /* cards, panels */
  --canvas:   #F3F1E9;  /* warm newsprint page background */
  --canvas-2: #EAE7DB;  /* sunken / alternating rows */

  /* ---- BRAND: SIGNAL GREEN (savings / best price / CTA) --- */
  --green-700: #017A43; /* text on light, hover */
  --green-500: #00B964; /* the brand green */
  --green-300: #8DEBB8; /* tints / chips */
  --green-100: #D8F8E6; /* wash */

  /* ---- SEMANTIC: PRICE DIRECTION ------------------------- */
  --up-600:   #C32A1E;  /* price increased — text */
  --up-500:   #E5342A;  /* price increased — fill */
  --up-100:   #FBDDDA;  /* wash */
  --down-600: #017A43;  /* price dropped — text (= green) */
  --down-500: #00B964;  /* price dropped — fill */
  --warn-500: #F5B100;  /* watch / caution highlight (brutalist marker) */

  /* ---- DERIVED ALIASES (foreground / background) --------- */
  --fg1: var(--ink-900);
  --fg2: var(--ink-600);
  --fg3: var(--ink-400);
  --bg1: var(--paper);
  --bg2: var(--canvas);
  --bg3: var(--canvas-2);
  --line: var(--ink-900);          /* borders are full-black in brutalism */
  --line-soft: var(--ink-300);     /* hairline dividers on canvas */
  --accent: var(--green-500);
  --accent-ink: var(--green-700);

  /* ---- BORDERS ------------------------------------------- */
  --bw: 2px;                                  /* default border weight */
  --bw-hair: 1px;
  --bw-bold: 3px;
  --border:      var(--bw) solid var(--line);
  --border-hair: var(--bw-hair) solid var(--line-soft);

  /* ---- RADII (brutalist = square) ------------------------ */
  --r-0: 0px;
  --r-sm: 2px;     /* used sparingly — chips, inputs */
  --r-pill: 999px; /* only for round toggles / avatars */

  /* ---- HARD OFFSET SHADOWS (no blur) --------------------- */
  --shadow-sm: 2px 2px 0 var(--ink-900);
  --shadow:    4px 4px 0 var(--ink-900);
  --shadow-lg: 6px 6px 0 var(--ink-900);
  --shadow-green: 4px 4px 0 var(--green-500);

  /* ---- SPACING (4px base / 8px grid) --------------------- */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
  --s-9: 96px;
  --s-10: 128px;

  /* ---- LAYOUT -------------------------------------------- */
  --container: 1200px;
  --gutter: 24px;

  /* ---- MOTION (snappy, minimal) -------------------------- */
  --ease: cubic-bezier(0.2, 0, 0, 1);
  --dur-fast: 90ms;
  --dur: 150ms;
}

/* ============================================================
   TYPE SCALE — semantic element styles
   Display uses Space Grotesk; numbers/labels use JetBrains Mono.
   ============================================================ */

.t-display {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(48px, 6vw, 76px);
  line-height: 0.96;
  letter-spacing: -0.03em;
  color: var(--fg1);
}

h1, .t-h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 40px;
  line-height: 1.04;
  letter-spacing: -0.02em;
  color: var(--fg1);
}

h2, .t-h2 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.015em;
  color: var(--fg1);
}

h3, .t-h3 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 20px;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--fg1);
}

.t-lead {
  font-family: var(--font-ui);
  font-weight: 400;
  font-size: 19px;
  line-height: 1.5;
  color: var(--fg2);
}

p, .t-body {
  font-family: var(--font-ui);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.55;
  color: var(--fg1);
}

.t-small {
  font-family: var(--font-ui);
  font-weight: 400;
  font-size: 14px;
  line-height: 1.45;
  color: var(--fg2);
}

/* Micro-labels: uppercase mono, the brutalist tag voice */
.t-label {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 12px;
  line-height: 1;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg2);
}

/* Prices — tabular mono, the hero number of the product */
.t-price {
  font-family: var(--font-mono);
  font-weight: 800;
  font-feature-settings: 'tnum' 1;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
  color: var(--fg1);
}

.t-price-lg { font-family: var(--font-mono); font-weight: 800; font-size: 40px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.t-price-md { font-family: var(--font-mono); font-weight: 700; font-size: 22px; font-variant-numeric: tabular-nums; }
.t-price-sm { font-family: var(--font-mono); font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }

code, .t-mono {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 500;
}

a, .t-link {
  color: var(--fg1);
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-underline-offset: 3px;
  text-decoration-color: var(--green-500);
}

</style>
<link rel="stylesheet" href="components.css">
<style>

/* ===== kit.css ===== */
/* ============================================================
   PRICY.NO WEB UI KIT — kit-specific layout
   Loads after colors_and_type.css + components.css
   ============================================================ */

* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  background: var(--canvas);
  color: var(--ink-900);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; }

.icon { display: inline-flex; align-items: center; justify-content: center; line-height: 0; }
.icon svg { width: 1em; height: 1em; stroke: currentColor; stroke-width: 2; }

.wrap { max-width: var(--container); margin: 0 auto; padding: 0 var(--gutter); }

/* ---- HEADER -------------------------------------------- */
.hdr { position: sticky; top: 0; z-index: 50; background: var(--paper); border-bottom: var(--bw) solid var(--ink-900); }
.hdr__row { display: flex; align-items: center; gap: var(--s-5); height: 68px; }
.hdr__logo { display: flex; align-items: center; cursor: pointer; flex: 0 0 auto; }
.hdr__logo img { display: block; height: 30px; }
.hdr__search { flex: 1; max-width: 560px; }
.hdr__nav { display: flex; align-items: center; gap: var(--s-2); margin-left: auto; }
.navlink { font-family: var(--font-mono); font-weight: 700; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-900); text-decoration: none; padding: 8px 10px; cursor: pointer; border: 2px solid transparent; }
.navlink:hover { background: var(--canvas-2); }
.navlink.is-active { border-color: var(--ink-900); }

/* ---- HERO ---------------------------------------------- */
.hero { background: var(--canvas); border-bottom: var(--bw) solid var(--ink-900); }
.hero__inner { padding: var(--s-9) 0 var(--s-8); max-width: 880px; }
.hero h1 { font-size: clamp(44px, 6.5vw, 76px); line-height: 0.95; letter-spacing: -0.03em; margin: 0 0 var(--s-4); }
.hero h1 .hl { background: var(--green-500); padding: 0 8px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
.hero__sub { font-size: 20px; color: var(--ink-600); max-width: 560px; margin: 0 0 var(--s-6); }
.hero__search { display: flex; max-width: 680px; box-shadow: var(--shadow); }
.hero__search .field { flex: 1; height: 64px; border-right: 0; }
.hero__search .field input { font-size: 18px; }
.hero__popular { display: flex; flex-wrap: wrap; gap: var(--s-2); margin-top: var(--s-5); align-items: center; }
.hero__popular .lbl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-400); margin-right: 4px; }

/* ---- SECTION ------------------------------------------- */
.section { padding: var(--s-8) 0; }
.section__head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--s-5); border-bottom: var(--bw) solid var(--ink-900); padding-bottom: var(--s-3); }
.section__head h2 { margin: 0; }
.section__head .more { font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }

/* ---- PRODUCT GRID / CARD ------------------------------- */
.pgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: var(--bw) solid var(--ink-900); border-right: 0; border-bottom: 0; }
.pcard { border-right: var(--bw) solid var(--ink-900); border-bottom: var(--bw) solid var(--ink-900); background: var(--paper); padding: var(--s-4); cursor: pointer; display: flex; flex-direction: column; gap: var(--s-3); transition: background var(--dur-fast) var(--ease); position: relative; }
.pcard:hover { background: var(--green-100); }
.pcard__img { aspect-ratio: 4/3; background: var(--canvas-2); border: var(--bw-hair) solid var(--ink-300); display: flex; align-items: center; justify-content: center; }
.pcard__img .icon { font-size: 40px; color: var(--ink-400); }
.pcard__name { font-family: var(--font-display); font-weight: 600; font-size: 15px; line-height: 1.25; }
.pcard__meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
.pcard__foot { margin-top: auto; display: flex; align-items: flex-end; justify-content: space-between; }
.pcard__from { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-400); }
.pcard__tag { position: absolute; top: 0; left: 0; }

.price { display: inline-flex; align-items: baseline; gap: 3px; }
.price .cur { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--ink-600); }

/* ---- RESULTS LAYOUT ------------------------------------ */
.results { display: grid; grid-template-columns: 248px 1fr; gap: var(--s-6); align-items: start; padding: var(--s-6) 0 var(--s-9); }
.filters { border: var(--bw) solid var(--ink-900); background: var(--paper); position: sticky; top: 84px; }
.filters__grp { border-bottom: var(--bw) solid var(--ink-900); padding: var(--s-4); }
.filters__grp:last-child { border-bottom: 0; }
.filters__grp h4 { margin: 0 0 var(--s-3); font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-600); }
.check { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; font-size: 14px; }
.check .box { width: 18px; height: 18px; border: 2px solid var(--ink-900); display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.check.is-on .box { background: var(--green-500); }
.check .box .icon { font-size: 13px; opacity: 0; }
.check.is-on .box .icon { opacity: 1; }
.check .ct { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }

.results__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--s-4); }
.results__head .count { font-family: var(--font-mono); font-size: 13px; color: var(--ink-600); }
.sortbar { display: flex; gap: 0; border: 2px solid var(--ink-900); }
.sortbar button { border: 0; border-right: 2px solid var(--ink-900); background: var(--paper); padding: 8px 14px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; }
.sortbar button:last-child { border-right: 0; }
.sortbar button.is-on { background: var(--ink-900); color: var(--paper); }

/* result row (list view) */
.rrow { display: grid; grid-template-columns: 92px 1fr auto; gap: var(--s-4); align-items: center; background: var(--paper); border: var(--bw) solid var(--ink-900); padding: var(--s-3) var(--s-4); cursor: pointer; transition: box-shadow var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease); }
.rrow + .rrow { border-top: 0; }
.rrow:hover { box-shadow: var(--shadow); transform: translate(-1px,-1px); position: relative; z-index: 2; }
.rrow__img { width: 92px; height: 72px; background: var(--canvas-2); border: var(--bw-hair) solid var(--ink-300); display: flex; align-items: center; justify-content: center; color: var(--ink-400); font-size: 30px; }
.rrow__name { font-family: var(--font-display); font-weight: 600; font-size: 17px; line-height: 1.2; margin-bottom: 4px; }
.rrow__meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); display: flex; gap: 12px; }
.rrow__price { text-align: right; }
.rrow__from { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-400); }
.rrow__shops { font-family: var(--font-mono); font-size: 11px; color: var(--green-700); margin-top: 2px; }

/* ---- PRODUCT DETAIL ------------------------------------ */
.pdp { padding: var(--s-6) 0 var(--s-9); }
.pdp__crumb { font-family: var(--font-mono); font-size: 12px; color: var(--ink-400); margin-bottom: var(--s-4); display: flex; gap: 8px; align-items: center; }
.pdp__crumb a { color: var(--ink-600); text-decoration: none; cursor: pointer; }
.pdp__crumb a:hover { color: var(--ink-900); }
.pdp__top { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-6); }
.pdp__gallery { border: var(--bw) solid var(--ink-900); background: var(--paper); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; color: var(--ink-300); font-size: 120px; }
.pdp__info h1 { font-size: 34px; line-height: 1.05; margin: 0 0 var(--s-2); }
.pdp__brand { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-400); margin-bottom: var(--s-4); }

.vgrp { margin: 0 0 var(--s-4); }
.vgrp__label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-400); margin-bottom: 8px; }
.vgrp__label b { color: var(--ink-900); }
.vgrp__opts { display: flex; flex-wrap: wrap; gap: 8px; }
.vopt { border: var(--bw) solid var(--ink-900); background: var(--paper); padding: 6px 12px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: baseline; gap: 8px; line-height: 1.2; }
.vopt:hover { box-shadow: var(--shadow); transform: translate(-1px, -1px); }
.vopt.is-on { background: var(--ink-900); color: var(--paper); }
.vopt__d { font-size: 10px; color: var(--ink-400); font-weight: 400; }
.vopt.is-on .vopt__d { color: var(--paper); opacity: 0.65; }
.vopt--sw { width: 30px; height: 30px; padding: 0; justify-content: center; }
.vopt--sw.is-on { outline: 2px solid var(--ink-900); outline-offset: 2px; background: inherit; }

.bestbox { border: var(--bw) solid var(--ink-900); box-shadow: var(--shadow); margin: var(--s-4) 0; }
.bestbox__top { background: var(--green-500); padding: var(--s-4); display: flex; align-items: flex-end; justify-content: space-between; border-bottom: var(--bw) solid var(--ink-900); }
.bestbox__top .label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.bestbox__price { display: flex; align-items: baseline; gap: 4px; }
.bestbox__price .cur { font-family: var(--font-mono); font-weight: 700; font-size: 20px; }
.bestbox__bot { padding: var(--s-3) var(--s-4); display: flex; align-items: center; justify-content: space-between; background: var(--paper); font-size: 14px; flex-wrap: wrap; gap: 6px 14px; }

/* offer table */
.offers { border: var(--bw) solid var(--ink-900); background: var(--paper); }
.offers__h { display: grid; grid-template-columns: 1fr 110px 120px 120px; gap: var(--s-3); padding: var(--s-3) var(--s-4); border-bottom: var(--bw) solid var(--ink-900); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-400); }
.orow { display: grid; grid-template-columns: 1fr 110px 120px 120px; gap: var(--s-3); padding: var(--s-3) var(--s-4); align-items: center; border-bottom: var(--bw-hair) solid var(--ink-300); }
.orow:last-child { border-bottom: 0; }
.orow.is-best { background: var(--green-100); }
.orow__shop { font-family: var(--font-display); font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; }
.orow__ship { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }

/* price history chart */
.chart { border: var(--bw) solid var(--ink-900); background: var(--paper); padding: var(--s-4); }
.chart__head { display: flex; align-items: center; justify-content: space-between; gap: var(--s-3); flex-wrap: wrap; margin-bottom: var(--s-4); }
.chart__ranges { display: flex; border: var(--bw) solid var(--ink-900); }
.chart__ranges button { font-family: var(--font-mono); font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; padding: 4px 11px; background: var(--paper); color: var(--ink-600); border: 0; border-right: var(--bw) solid var(--ink-900); cursor: pointer; transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease); }
.chart__ranges button:last-child { border-right: 0; }
.chart__ranges button:hover { background: var(--green-100); color: var(--ink-900); }
.chart__ranges button.is-active { background: var(--ink-900); color: var(--paper); }
.chart svg { display: block; width: 100%; height: 180px; }
.chart__plot { position: relative; cursor: crosshair; }
.chart__cursor { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--ink-900); opacity: .3; transform: translateX(-50%); pointer-events: none; }
.chart__dot { position: absolute; width: 12px; height: 12px; background: var(--paper); border: 3px solid var(--ink-900); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 2; }
.chart__tip { position: absolute; transform: translate(-50%, calc(-100% - 16px)); background: var(--ink-900); color: var(--paper); padding: 6px 10px; display: flex; flex-direction: column; gap: 2px; white-space: nowrap; pointer-events: none; z-index: 3; }
.chart__tip--left { transform: translate(calc(-100% - 12px), -50%); }
.chart__tip--right { transform: translate(12px, -50%); }
.chart__tip-price { font-family: var(--font-mono); font-weight: 800; font-size: 15px; line-height: 1; }
.chart__tip-when { font-family: var(--font-mono); font-size: 10px; opacity: .65; text-transform: uppercase; letter-spacing: .05em; }

/* ---- DEALS --------------------------------------------- */
.dealgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: var(--bw) solid var(--ink-900); border-right: 0; border-bottom: 0; }
.deal { border-right: var(--bw) solid var(--ink-900); border-bottom: var(--bw) solid var(--ink-900); background: var(--paper); padding: var(--s-5); cursor: pointer; display: flex; flex-direction: column; gap: var(--s-3); transition: background var(--dur-fast) var(--ease); }
.deal:hover { background: var(--green-100); }
.deal__drop { font-family: var(--font-mono); font-weight: 800; font-size: 44px; color: var(--green-700); line-height: 1; letter-spacing: -0.02em; }
.deal__name { font-family: var(--font-display); font-weight: 600; font-size: 16px; line-height: 1.25; }
.deal__prices { display: flex; align-items: baseline; gap: 10px; margin-top: auto; }
.deal__was { font-family: var(--font-mono); font-size: 14px; color: var(--ink-400); text-decoration: line-through; }

/* ---- FOOTER -------------------------------------------- */
.ftr { background: var(--ink-900); color: var(--paper); border-top: var(--bw) solid var(--ink-900); }
.ftr__row { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--s-6); padding: var(--s-7) 0; flex-wrap: wrap; }
.ftr__col h5 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--green-500); margin: 0 0 var(--s-3); }
.ftr__col a { display: block; color: var(--ink-300); text-decoration: none; font-size: 14px; padding: 4px 0; cursor: pointer; }
.ftr__col a:hover { color: var(--paper); }
.ftr img { height: 28px; }
.ftr__bot { border-top: 1px solid #333; padding: var(--s-4) 0; font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); display: flex; justify-content: space-between; }

/* ---- POPULAR / CATEGORY CHIP -------------------------- */
.cchip { font-family: var(--font-mono); font-size: 12px; font-weight: 500; padding: 6px 12px; border: 2px solid var(--ink-900); background: var(--paper); cursor: pointer; text-decoration: none; color: var(--ink-900); }
.cchip:hover { background: var(--ink-900); color: var(--paper); }

@media (max-width: 900px) {
  .pgrid { grid-template-columns: repeat(2, 1fr); }
  .dealgrid { grid-template-columns: repeat(2, 1fr); }
  .results { grid-template-columns: 1fr; }
  .pdp__top { grid-template-columns: 1fr; }
  .filters { position: static; }
}

/* ===== app.css ===== */
/* ============================================================
   PRICY.NO — PROTOTYPE APP STYLES
   Builds on colors_and_type.css + components.css + kit.css
   Screens: Login · Landing (public) · Home (signed-in index)
   ============================================================ */

#root { min-height: 100vh; }

/* ---- SCREEN TRANSITIONS -------------------------------- */
.screen { opacity: 1; }
@media (prefers-reduced-motion: no-preference) {
  .screen { animation: screen-in var(--dur) var(--ease) both; }
}
@keyframes screen-in {
  from { transform: translateY(8px); }
  to   { transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  .screen, .pop-in, .draw, .alert-pulse { animation: none !important; }
}

/* ============================================================
   LOGIN
   ============================================================ */
.auth {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  background: var(--canvas);
}
.auth__brand {
  background: var(--ink-900);
  color: var(--paper);
  padding: var(--s-7) var(--s-8);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  border-right: var(--bw) solid var(--ink-900);
}
.auth__brand-top { display: flex; align-items: center; gap: 10px; }
.auth__brand-top img { height: 30px; }
.auth__brand-line {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--green-500);
}
.auth__pitch { margin-top: auto; max-width: 440px; }
.auth__pitch h2 {
  color: var(--paper); font-size: clamp(30px, 3.4vw, 46px);
  line-height: 1.0; letter-spacing: -0.025em; margin: 0 0 var(--s-5);
}
.auth__pitch h2 .hl { background: var(--green-500); color: var(--ink-900); padding: 0 8px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }

/* live demo chart inside brand panel */
.demo {
  margin-top: var(--s-6);
  border: var(--bw) solid var(--paper);
  background: #161614;
  padding: var(--s-4);
}
.demo__row { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--s-3); }
.demo__name { font-family: var(--font-display); font-weight: 600; font-size: 15px; color: var(--paper); }
.demo__pricewrap { display: flex; align-items: baseline; gap: 8px; }
.demo__price { font-family: var(--font-mono); font-weight: 800; font-size: 22px; color: var(--green-500); font-variant-numeric: tabular-nums; }
.demo__was { font-family: var(--font-mono); font-size: 13px; color: var(--ink-400); text-decoration: line-through; }
.demo svg { display: block; width: 100%; height: 86px; }
.demo__alert {
  margin-top: var(--s-3); display: flex; align-items: center; gap: 8px;
  background: var(--green-500); color: var(--ink-900); padding: 8px 12px;
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
}

.auth__brand-grid {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
  background-image: linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
}

/* form side */
.auth__form-side { display: flex; align-items: center; justify-content: center; padding: var(--s-7); }
.authcard { width: 100%; max-width: 400px; }
.authcard__eyebrow { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-400); margin-bottom: var(--s-2); }
.authcard h1 { font-size: 34px; margin: 0 0 var(--s-5); letter-spacing: -0.02em; }

/* method segmented toggle */
.seg { display: flex; border: var(--bw) solid var(--ink-900); margin-bottom: var(--s-5); box-shadow: var(--shadow-sm); }
.seg button {
  flex: 1; border: 0; border-right: var(--bw) solid var(--ink-900);
  background: var(--paper); padding: 11px 10px; cursor: pointer;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.03em; color: var(--ink-600);
  display: inline-flex; align-items: center; justify-content: center; gap: 7px; white-space: nowrap;
  transition: background var(--dur-fast) var(--ease), color var(--dur-fast) var(--ease);
}
.seg button:last-child { border-right: 0; }
.seg button.is-on { background: var(--ink-900); color: var(--paper); }

.formfield { margin-bottom: var(--s-4); }
.formfield label {
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-600);
  margin-bottom: 7px;
}
.formfield label .forgot { color: var(--ink-400); cursor: pointer; text-transform: none; letter-spacing: 0; font-size: 12px; }
.formfield label .forgot:hover { color: var(--green-700); }
.formfield .field { height: 50px; }
.formfield .field.is-invalid { border-color: var(--up-500); }
.formfield .field .lead-ic { display: flex; align-items: center; padding: 0 0 0 14px; color: var(--ink-400); }
.formfield .field .pw-toggle { background: none; border: 0; padding: 0 14px; cursor: pointer; color: var(--ink-400); display: flex; align-items: center; }
.formfield .field .pw-toggle:hover { color: var(--ink-900); }
.formhint { font-family: var(--font-mono); font-size: 12px; color: var(--ink-400); margin: -4px 0 var(--s-4); line-height: 1.5; }
.formhint.err { color: var(--up-600); }

.auth-submit { width: 100%; height: 52px; font-size: 14px; }
.auth-submit .spinner { width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.auth-or { display: flex; align-items: center; gap: 12px; margin: var(--s-5) 0; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-400); }
.auth-or::before, .auth-or::after { content: ''; flex: 1; border-top: var(--bw-hair) solid var(--ink-300); }

.auth-alt { width: 100%; }
.auth-foot { margin-top: var(--s-6); font-family: var(--font-mono); font-size: 13px; color: var(--ink-600); text-align: center; }
.auth-foot a { color: var(--ink-900); cursor: pointer; }

/* magic-link sent state */
.sent { text-align: center; animation: pop-in var(--dur) var(--ease) both; }
.sent__icon {
  width: 72px; height: 72px; margin: 0 auto var(--s-4); border: var(--bw) solid var(--ink-900);
  background: var(--green-500); display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow); color: var(--ink-900);
}
.sent__icon .icon { font-size: 34px; }
.sent h1 { font-size: 28px; margin: 0 0 var(--s-3); }
.sent p { color: var(--ink-600); font-size: 15px; margin: 0 0 var(--s-5); }
.sent .addr { font-family: var(--font-mono); font-weight: 700; color: var(--ink-900); }
@keyframes pop-in { from { opacity: 0; transform: scale(0.94) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

/* ============================================================
   SHARED — signed-in chrome
   ============================================================ */
.app-hdr { position: sticky; top: 0; z-index: 50; background: var(--paper); border-bottom: var(--bw) solid var(--ink-900); }
.app-hdr__row { display: flex; align-items: center; gap: var(--s-4); height: 64px; }
.app-hdr__logo { display: flex; align-items: center; cursor: pointer; flex: 0 0 auto; }
.app-hdr__logo img { display: block; height: 26px; }
.app-hdr__search { flex: 1; max-width: 620px; position: relative; }
.app-hdr__search .field { height: 44px; box-shadow: none; }
.app-hdr__search .field:focus-within { box-shadow: var(--shadow-sm); }
.app-hdr__nav { display: flex; align-items: center; gap: var(--s-1); margin-left: auto; }
.app-hdr__icon { position: relative; width: 40px; height: 40px; border: var(--bw) solid transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-900); }
.app-hdr__icon:hover { background: var(--canvas-2); }
.app-hdr__icon .badge { position: absolute; top: 2px; right: 2px; min-width: 16px; height: 16px; padding: 0 3px; background: var(--up-500); color: #fff; border: 1.5px solid var(--ink-900); font-family: var(--font-mono); font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
.avatar { width: 38px; height: 38px; border: var(--bw) solid var(--ink-900); background: var(--green-300); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-weight: 800; font-size: 14px; cursor: pointer; }

.page { max-width: var(--container); margin: 0 auto; padding: 0 var(--gutter); }

/* account dropdown */
.acctmenu { position: absolute; top: calc(100% + 8px); right: 0; width: 230px; background: var(--paper); border: var(--bw) solid var(--ink-900); box-shadow: var(--shadow); z-index: 70; animation: pop-in var(--t-fast) both; }
.acctmenu__id { display: flex; flex-direction: column; gap: 2px; padding: 12px var(--s-4); border-bottom: var(--bw) solid var(--ink-900); background: var(--canvas-2); }
.acctmenu__id b { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
.acctmenu__id span { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
.acctmenu__item { display: flex; align-items: center; gap: 10px; padding: 10px var(--s-4); font-size: 14px; cursor: pointer; }
.acctmenu__item:hover { background: var(--canvas-2); }
.acctmenu__sep { border-top: var(--bw) solid var(--ink-900); }

/* search suggest dropdown */
.suggest { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--paper); border: var(--bw) solid var(--ink-900); box-shadow: var(--shadow); z-index: 60; animation: pop-in var(--dur-fast) var(--ease) both; }
.suggest__grp { padding: 10px var(--s-4) 6px; font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-400); }
.suggest__item { display: flex; align-items: center; gap: 12px; padding: 9px var(--s-4); cursor: pointer; font-size: 14px; }
.suggest__item:hover, .suggest__item.is-active { background: var(--green-100); }
.suggest__item .ic { color: var(--ink-400); display: flex; }
.suggest__item .price { margin-left: auto; }
.suggest__item .sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
.suggest__props { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px var(--s-4) 12px; }

/* ============================================================
   SIGNED-IN HOME (index)
   ============================================================ */
.home { padding: var(--s-6) 0 var(--s-9); }
.home__greet { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: var(--s-5); flex-wrap: wrap; gap: var(--s-3); }
.home__greet h1 { font-size: 30px; margin: 0; letter-spacing: -0.02em; }
.home__greet .wave { color: var(--ink-400); font-family: var(--font-mono); font-size: 13px; margin-top: 6px; }

/* hero search (search-first layout) */
.searchhero { border: var(--bw) solid var(--ink-900); background: var(--paper); box-shadow: var(--shadow); padding: var(--s-7) var(--s-6); margin-bottom: var(--s-6); position: relative; overflow: hidden; }
.searchhero__inner { max-width: 760px; margin: 0 auto; position: relative; z-index: 2; text-align: center; }
.searchhero h1 { font-size: clamp(30px, 4vw, 48px); line-height: 0.98; letter-spacing: -0.03em; margin: 0 0 var(--s-5); }
.searchhero h1 .hl { background: var(--green-500); padding: 0 8px; }
.searchhero__bar { display: flex; box-shadow: var(--shadow); position: relative; }
.searchhero__bar .field { flex: 1; height: 60px; border-right: 0; }
.searchhero__bar .field input { font-size: 18px; }
.searchhero__chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: var(--s-4); align-items: center; }
.searchhero__chips .lbl { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-400); }

/* metric strip */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); border: var(--bw) solid var(--ink-900); margin-bottom: var(--s-6); background: var(--ink-900); gap: var(--bw); }
.metric { background: var(--paper); padding: var(--s-4) var(--s-5); }
.metric__k { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-400); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.metric__v { font-family: var(--font-mono); font-weight: 800; font-size: 30px; line-height: 1; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.metric__v.green { color: var(--green-700); }
.metric__sub { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 5px; }

/* section heads */
.sec { margin-bottom: var(--s-7); }
.sec__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--s-4); border-bottom: var(--bw) solid var(--ink-900); padding-bottom: var(--s-3); }
.sec__head h2 { margin: 0; font-size: 22px; display: inline-flex; align-items: center; gap: 10px; }
.sec__head .ico { color: var(--green-700); display: flex; }
.sec__head .more { font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; color: var(--ink-600); }
.sec__head .more:hover { color: var(--green-700); }
.sec__count { font-family: var(--font-mono); font-size: 12px; color: var(--ink-400); margin-left: 4px; }

/* WATCHED list rows */
.watchlist { border: var(--bw) solid var(--ink-900); background: var(--paper); }
.wrow { display: grid; grid-template-columns: 64px 1fr 150px 132px 120px; gap: var(--s-4); align-items: center; padding: var(--s-3) var(--s-4); border-bottom: var(--bw-hair) solid var(--ink-300); cursor: pointer; transition: background var(--dur-fast) var(--ease); position: relative; }
.wrow:last-child { border-bottom: 0; }
.wrow:hover { background: var(--canvas); }
.wrow.is-hit { background: var(--green-100); }
.wrow__img { width: 64px; height: 56px; background: var(--canvas-2); border: var(--bw-hair) solid var(--ink-300); display: flex; align-items: center; justify-content: center; color: var(--ink-400); font-size: 26px; position: relative; }
.wrow__name { font-family: var(--font-display); font-weight: 600; font-size: 16px; line-height: 1.2; }
.wrow__meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 3px; display: flex; gap: 10px; align-items: center; }
.wrow__spark svg { display: block; }
.wrow__target { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
.wrow__target b { color: var(--ink-900); font-weight: 700; }
.wrow__price { text-align: right; }
.wrow__from { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-400); }
.wrow__act { display: flex; justify-content: flex-end; }
.alert-pulse { animation: alert-pulse 1.6s var(--ease) infinite; }
@keyframes alert-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,185,100,0.0); } 50% { box-shadow: inset 3px 0 0 0 var(--green-500); } }
.wrow__flag { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--green-500); }

/* recently viewed rail */
.rail { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; border: var(--bw) solid var(--ink-900); border-right: 0; border-bottom: 0; }
.rcard { border-right: var(--bw) solid var(--ink-900); border-bottom: var(--bw) solid var(--ink-900); padding: var(--s-3); cursor: pointer; display: flex; flex-direction: column; gap: 8px; transition: background var(--dur-fast) var(--ease); }
.rcard:hover { background: var(--green-100); }
.rcard__img { aspect-ratio: 1/1; background: var(--canvas-2); border: var(--bw-hair) solid var(--ink-300); display: flex; align-items: center; justify-content: center; color: var(--ink-400); font-size: 32px; }
.rcard__name { font-family: var(--font-display); font-weight: 600; font-size: 13px; line-height: 1.2; }
.rcard__price { display: flex; align-items: baseline; justify-content: space-between; margin-top: auto; }

/* category grid */
.catgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: var(--bw) solid var(--ink-900); border-right: 0; border-bottom: 0; }
.cat { border-right: var(--bw) solid var(--ink-900); border-bottom: var(--bw) solid var(--ink-900); padding: var(--s-4); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background var(--dur-fast) var(--ease); background: var(--paper); }
.cat:hover { background: var(--ink-900); color: var(--paper); }
.cat:hover .cat__ic { color: var(--green-500); }
.cat:hover .cat__ct { color: var(--ink-400); }
.cat__ic { width: 38px; height: 38px; border: var(--bw) solid currentColor; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.cat__name { font-family: var(--font-display); font-weight: 600; font-size: 15px; }
.cat__ct { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 2px; }

/* dashboard 2-col layout */
.dash { display: grid; grid-template-columns: 1fr 320px; gap: var(--s-6); align-items: start; }
.dash__side { position: sticky; top: 80px; display: flex; flex-direction: column; gap: var(--s-5); }
.sidecard { border: var(--bw) solid var(--ink-900); background: var(--paper); }
.sidecard__head { padding: var(--s-3) var(--s-4); border-bottom: var(--bw) solid var(--ink-900); font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; justify-content: space-between; }
.sidecard__head .ic { color: var(--green-700); }
.sidecard__body { padding: var(--s-4); }

/* alert feed items */
.afeed { display: flex; flex-direction: column; }
.afeed__item { display: flex; gap: 12px; padding: var(--s-3) var(--s-4); border-bottom: var(--bw-hair) solid var(--ink-300); cursor: pointer; align-items: flex-start; }
.afeed__item:last-child { border-bottom: 0; }
.afeed__item:hover { background: var(--canvas); }
.afeed__dot { width: 30px; height: 30px; border: var(--bw) solid var(--ink-900); display: flex; align-items: center; justify-content: center; flex: 0 0 auto; font-size: 15px; }
.afeed__dot.down { background: var(--green-500); }
.afeed__dot.up { background: var(--up-100); color: var(--up-600); }
.afeed__dot.watch { background: var(--warn-500); }
.afeed__txt { font-size: 13px; line-height: 1.4; }
.afeed__txt b { font-family: var(--font-display); font-weight: 600; }
.afeed__time { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

/* FEED layout (activity stream) */
.feed { max-width: 760px; margin: 0 auto; }
.feedcard { border: var(--bw) solid var(--ink-900); background: var(--paper); margin-bottom: var(--s-4); box-shadow: var(--shadow-sm); transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); }
.feedcard:hover { transform: translate(-1px,-1px); box-shadow: var(--shadow); }
.feedcard__head { display: flex; align-items: center; gap: 10px; padding: var(--s-3) var(--s-4); border-bottom: var(--bw-hair) solid var(--ink-300); }
.feedcard__kind { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.feedcard__time { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-left: auto; }
.feedcard__body { display: grid; grid-template-columns: 80px 1fr auto; gap: var(--s-4); padding: var(--s-4); align-items: center; cursor: pointer; }
.feedcard__img { width: 80px; height: 70px; background: var(--canvas-2); border: var(--bw-hair) solid var(--ink-300); display: flex; align-items: center; justify-content: center; color: var(--ink-400); font-size: 30px; }
.feedcard__name { font-family: var(--font-display); font-weight: 600; font-size: 17px; }
.feedcard__sub { font-family: var(--font-mono); font-size: 12px; color: var(--ink-400); margin-top: 4px; }

/* drawn sparkline */
.draw path.draw-line { stroke-dasharray: 600; stroke-dashoffset: 600; animation: draw 1.1s var(--ease) forwards; }
@keyframes draw { to { stroke-dashoffset: 0; } }

/* animations off */
.no-anim .screen, .no-anim .draw path, .no-anim .draw-line, .no-anim .alert-pulse,
.no-anim .ticker__track, .no-anim .lhero__eyebrow .dot, .no-anim .sent { animation: none !important; }
.no-anim .draw-line { stroke-dashoffset: 0 !important; }

/* generic helpers */
.flex { display: flex; }
.between { display: flex; align-items: center; justify-content: space-between; }
.gap2 { gap: var(--s-2); } .gap3 { gap: var(--s-3); } .gap4 { gap: var(--s-4); }
.muted { color: var(--ink-400); }
.strike { text-decoration: line-through; color: var(--ink-400); }

/* ============================================================
   PUBLIC LANDING
   ============================================================ */
/* ticker */
.ticker { background: var(--ink-900); border-bottom: var(--bw) solid var(--ink-900); overflow: hidden; }
.ticker__track { display: flex; width: max-content; animation: ticker 38s linear infinite; }
.ticker:hover .ticker__track { animation-play-state: paused; }
@keyframes ticker { to { transform: translateX(-50%); } }
.tick-row { display: flex; }
.tick-item { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border-right: 1px solid #333; color: var(--paper); font-family: var(--font-mono); font-size: 12px; white-space: nowrap; }
.tick-item .icon { color: var(--ink-400); }
.tick-name { color: var(--ink-300); }
.tick-drop { color: var(--green-500); font-weight: 700; }
.tick-price { color: var(--paper); font-weight: 700; }

/* hero */
.lhero { border-bottom: var(--bw) solid var(--ink-900); background: var(--canvas); }
.lhero__grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-8); align-items: center; padding: var(--s-9) 0 var(--s-9); }
.lhero__eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-600); margin-bottom: var(--s-5); border: var(--bw) solid var(--ink-900); padding: 8px 14px; background: var(--paper); white-space: nowrap; line-height: 1; }
.lhero__eyebrow .dot { width: 8px; height: 8px; background: var(--green-500); border-radius: 50%; flex: 0 0 auto; animation: blink 1.6s var(--ease) infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }
.lhero__copy h1 { font-size: clamp(56px, 7vw, 92px); line-height: 0.9; letter-spacing: -0.04em; margin: 0 0 var(--s-5); }
.lhero__copy h1 .hl { background: var(--green-500); padding: 0 10px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
.lhero__sub { font-size: 20px; color: var(--ink-600); max-width: 440px; margin: 0 0 var(--s-6); line-height: 1.45; }
.lhero__cta { display: flex; gap: var(--s-3); flex-wrap: wrap; margin-bottom: var(--s-6); }
.lhero__trust { display: flex; align-items: center; gap: var(--s-4); font-family: var(--font-mono); font-size: 13px; color: var(--ink-600); }
.lhero__trust b { color: var(--ink-900); font-weight: 800; }
.lhero__trust .sep { width: 1px; height: 14px; background: var(--ink-300); }

/* steps */
.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: var(--bw) solid var(--ink-900); border-right: 0; box-shadow: var(--shadow); }
.step { border-right: var(--bw) solid var(--ink-900); padding: var(--s-6); position: relative; background: var(--paper); }
.step__n { position: absolute; top: var(--s-4); right: var(--s-4); font-family: var(--font-mono); font-weight: 800; font-size: 13px; color: var(--ink-300); }
.step__ic { width: 52px; height: 52px; border: var(--bw) solid var(--ink-900); background: var(--green-500); display: flex; align-items: center; justify-content: center; margin-bottom: var(--s-4); box-shadow: var(--shadow-sm); }
.step__title { font-family: var(--font-display); font-weight: 600; font-size: 22px; margin-bottom: var(--s-2); letter-spacing: -0.01em; }
.step__txt { font-size: 15px; color: var(--ink-600); line-height: 1.45; max-width: 240px; }

/* cta band */
.lcta { background: var(--ink-900); border-top: var(--bw) solid var(--ink-900); }
.lcta__inner { display: flex; align-items: center; justify-content: space-between; padding: var(--s-8) var(--gutter); gap: var(--s-5); flex-wrap: wrap; }
.lcta__inner h2 { color: var(--paper); font-size: clamp(32px, 4vw, 48px); line-height: 1.0; letter-spacing: -0.02em; margin: 0; }

/* responsive */
@media (max-width: 1000px) {
  .lhero__grid { grid-template-columns: 1fr; gap: var(--s-6); padding: var(--s-7) 0; }
  .lhero__demo { order: -1; }
  .steps { grid-template-columns: 1fr; border-right: var(--bw) solid var(--ink-900); }
  .step { border-right: 0; border-bottom: var(--bw) solid var(--ink-900); }
  .step:last-child { border-bottom: 0; }
  .auth { grid-template-columns: 1fr; }
  .auth__brand { display: none; }
  .dash { grid-template-columns: 1fr; }
  .dash__side { position: static; flex-direction: row; flex-wrap: wrap; }
  .dash__side .sidecard { flex: 1 1 280px; }
  .rail { grid-template-columns: repeat(3, 1fr); }
  .catgrid { grid-template-columns: repeat(2, 1fr); }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .wrow { grid-template-columns: 56px 1fr auto; }
  .wrow__spark, .wrow__target { display: none; }
}

/* ============================================================
   SEARCH RESULTS SCREEN  (Results.jsx)
   ============================================================ */
.results__main { min-width: 0; }
.results__title { margin-bottom: var(--s-3); }
.results__title h1 { font-size: 30px; }
.results__title .q { color: var(--green-700); }

.results__bar { display: flex; align-items: center; justify-content: space-between; gap: var(--s-4); margin-bottom: var(--s-4); flex-wrap: wrap; }
.results__bar .count { font-family: var(--font-mono); font-size: 13px; color: var(--ink-600); }
.results__sort { display: flex; align-items: center; gap: 10px; }
.results__sortlbl { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-400); }
.results__sort .sortbar button { white-space: nowrap; padding: 8px 12px; letter-spacing: 0.02em; }

/* rail: category nav list */
.catlist { display: flex; flex-direction: column; gap: 2px; }
.catlink { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 0 -8px; cursor: pointer; font-size: 14px; }
.catlink:hover { background: var(--canvas-2); }
.catlink.is-on { background: var(--ink-900); color: var(--paper); }
.catlink.is-on .catlink__ic { color: var(--green-500); }
.catlink__ic { display: flex; color: var(--ink-600); }
.catlink .ct { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
.catlink.is-on .ct { color: var(--green-300); }

/* price fields + range slider */
.pricefields { display: flex; align-items: center; gap: 8px; }
.pricefields input { width: 100%; min-width: 0; border: 2px solid var(--ink-900); background: var(--paper); padding: 7px 8px; font-family: var(--font-mono); font-size: 13px; }
.pricefields input:focus { outline: 0; box-shadow: var(--shadow-sm); }
.pricefields__d { color: var(--ink-400); }
.pricefields__lbl { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); margin-top: 4px; }
.range { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; background: var(--ink-900); margin-top: 12px; cursor: pointer; }
.range::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--green-500); border: 2px solid var(--ink-900); cursor: pointer; }
.range::-moz-range-thumb { width: 18px; height: 18px; background: var(--green-500); border: 2px solid var(--ink-900); cursor: pointer; border-radius: 0; }

/* rating options */
.ropt { display: flex; align-items: center; gap: 8px; padding: 5px 8px; margin: 0 -8px; cursor: pointer; font-size: 13px; white-space: nowrap; }
.ropt:hover { background: var(--canvas-2); }
.ropt.is-on { background: var(--green-100); }
.ropt__stars { color: var(--warn-500); letter-spacing: 1px; font-size: 13px; }
.stars__off { color: var(--ink-300); }

/* stars inline */
.stars { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 12px; }
.stars__ic { color: var(--warn-500); letter-spacing: 1px; }
.stars b { font-weight: 700; }
.stars__n { color: var(--ink-400); }

/* active filter chips */
.activechips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: var(--s-4); }
.fchip { display: inline-flex; align-items: center; gap: 6px; border: 2px solid var(--green-700); background: var(--green-100); color: var(--green-700); padding: 5px 10px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.fchip:hover { background: var(--green-300); }
.fchip--clear { background: var(--paper); color: var(--ink-900); border-color: var(--ink-900); }
.fchip--clear:hover { background: var(--ink-900); color: var(--paper); }

/* result row — flex (supports optional sparkline col) */
.rlist { display: flex; flex-direction: column; }
.rlist .rrow { display: flex; align-items: center; gap: var(--s-4); }
.rrow__img { flex: 0 0 auto; }
.rrow__main { flex: 1; min-width: 0; }
.rrow__brand { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-400); }
.rrow__name { font-family: var(--font-display); font-weight: 600; font-size: 18px; line-height: 1.15; margin: 2px 0 6px; }
.rrow__metarow { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.rrow__feat { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-600); border: 1px solid var(--ink-300); padding: 2px 6px; white-space: nowrap; }
.rrow__stock { font-family: var(--font-mono); font-size: 11px; white-space: nowrap; }
.rrow__stock.ok { color: var(--green-700); }
.rrow__stock.no { color: var(--ink-400); }
.rrow__spark { flex: 0 0 auto; display: flex; align-items: center; padding: 0 var(--s-2); }
.rrow__price { flex: 0 0 auto; text-align: right; min-width: 122px; }
.rrow__drop { display: block; margin-bottom: 6px; }
.rrow__save { flex: 0 0 auto; width: 40px; height: 40px; border: 2px solid var(--ink-900); background: var(--paper); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-900); transition: background var(--dur-fast) var(--ease); }
.rrow__save:hover { background: var(--canvas-2); }
.rrow__save.is-on { background: var(--green-500); }

/* compact density */
.results.is-compact .rrow { padding: var(--s-2) var(--s-4); }
.results.is-compact .rrow__name { font-size: 16px; margin: 1px 0 4px; }
.results.is-compact .rrow__img { width: 60px; height: 54px; }

/* grid view in results */
.results .pgrid { grid-template-columns: repeat(3, 1fr); }
.results--topbar .pgrid { grid-template-columns: repeat(4, 1fr); }

/* topbar filter layout */
.results--topbar { grid-template-columns: 1fr; }
.filterbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border: 2px solid var(--ink-900); background: var(--paper); padding: 8px 10px; margin-bottom: var(--s-5); box-shadow: var(--shadow-sm); }
.filterbar__sep { width: 2px; align-self: stretch; background: var(--ink-300); margin: 0 2px; }
.fdrop { position: relative; }
.fdrop__btn { display: inline-flex; align-items: center; gap: 6px; border: 2px solid var(--ink-900); background: var(--paper); padding: 8px 12px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.fdrop__btn.is-on { background: var(--green-100); color: var(--green-700); border-color: var(--green-700); }
.fdrop__btn.is-open { box-shadow: var(--shadow-sm); }
.fdrop__menu { position: absolute; top: calc(100% + 6px); left: 0; min-width: 210px; background: var(--paper); border: 2px solid var(--ink-900); box-shadow: var(--shadow); z-index: 40; padding: 10px 14px; animation: pop-in 90ms var(--ease); }
.fmenu__item { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; font-size: 14px; }
.fmenu__item .ct { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
.fmenu__item:hover { color: var(--green-700); }
.fmenu__item.is-on { color: var(--green-700); font-weight: 600; }
.fpill { border: 2px solid var(--ink-900); background: var(--paper); padding: 8px 12px; font-family: var(--font-mono); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.fpill.is-on { background: var(--green-500); }

/* empty state */
.empty { border: 2px solid var(--ink-900); background: var(--paper); padding: var(--s-8) var(--s-6); text-align: center; box-shadow: var(--shadow); }
.empty__ic { width: 72px; height: 72px; border: 2px solid var(--ink-900); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--s-4); background: var(--canvas-2); color: var(--ink-600); }
.empty h2 { margin: 0 0 8px; }
.empty p { color: var(--ink-600); margin: 0 0 var(--s-5); }

/* ---- PDP additions ---- */
.watchbox { border: 2px solid var(--ink-900); background: var(--canvas-2); padding: var(--s-4); margin-top: var(--s-4); }
.watchbox__row { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--s-4); flex-wrap: wrap; }
.watchbox__field { display: flex; align-items: center; gap: 4px; border: 2px solid var(--ink-900); background: var(--paper); padding: 8px 12px; }
.watchbox__field .cur { font-family: var(--font-mono); font-weight: 700; color: var(--ink-600); }
.watchbox__field input { border: 0; outline: 0; background: transparent; font-family: var(--font-mono); font-weight: 800; font-size: 20px; width: 96px; }
.pdp__grid { display: grid; grid-template-columns: 1.15fr 1fr; gap: var(--s-6); margin-top: var(--s-6); align-items: start; }
.chart__legend { display: flex; gap: var(--s-5); margin-top: var(--s-3); font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); }
.chart__legend .dot { display: inline-block; width: 14px; height: 3px; vertical-align: middle; margin-right: 6px; }
.chart__legend .dot--line { background: var(--ink-900); }
.chart__legend .dot--low { background: var(--green-500); }

@media (max-width: 900px) {
  .results .pgrid, .results--topbar .pgrid { grid-template-columns: repeat(2, 1fr); }
  .pdp__grid { grid-template-columns: 1fr; }
  .rrow__spark { display: none; }
}


/* ===== pages.css ===== */
/* ============================================================
   PRICY.NO — NEW PAGES (browse · alerts · account · onboarding · about)
   Builds on colors_and_type.css + components.css + kit.css + app.css
   ============================================================ */

:root { color-scheme: light; }
button { color: inherit; }

/* ---- header active icon + user menu ---------------------- */
.app-hdr__icon.is-on { border-color: var(--ink-900); background: var(--canvas-2); }
.umenu { position: absolute; top: calc(100% + 8px); right: 0; width: 240px; background: var(--paper); border: var(--bw) solid var(--ink-900); box-shadow: var(--shadow); z-index: 70; animation: pop-in var(--dur-fast) var(--ease) both; }
.umenu__head { padding: var(--s-3) var(--s-4); border-bottom: var(--bw) solid var(--ink-900); font-family: var(--font-display); font-weight: 600; font-size: 15px; }
.umenu__head span { display: block; font-family: var(--font-mono); font-size: 11px; font-weight: 400; color: var(--ink-400); margin-top: 2px; }
.umenu__item { display: flex; align-items: center; gap: 10px; padding: 10px var(--s-4); font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; cursor: pointer; color: var(--ink-900); }
.umenu__item:hover { background: var(--green-100); }
.umenu__item .icon { color: var(--ink-600); display: flex; }
.umenu__item + .umenu__item { border-top: var(--bw-hair) solid var(--ink-300); }

/* ---- Plus tag / lock / modal ------------------------------ */
.plus-tag { display: inline-flex; align-items: center; font-family: var(--font-mono); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; background: var(--ink-900); color: var(--green-300); padding: 3px 7px; }
.overlay { position: fixed; inset: 0; background: rgba(14,14,14,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: var(--s-5); animation: fade-in var(--dur) var(--ease) both; }
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
.pmodal { width: 100%; max-width: 500px; background: var(--paper); border: var(--bw-bold) solid var(--ink-900); box-shadow: 8px 8px 0 var(--green-500); animation: pop-in var(--dur) var(--ease) both; }
.pmodal__head { background: var(--ink-900); color: var(--paper); padding: var(--s-5); display: flex; align-items: flex-start; justify-content: space-between; }
.pmodal__head h2 { margin: 6px 0 0; font-size: 26px; letter-spacing: -0.02em; color: var(--paper); }
.pmodal__head .x { background: none; border: 0; color: var(--ink-400); cursor: pointer; padding: 4px; display: flex; }
.pmodal__head .x:hover { color: var(--paper); }
.pmodal__body { padding: var(--s-5); }
.pmodal__feat { display: flex; gap: 12px; padding: 11px 0; border-bottom: var(--bw-hair) solid var(--ink-300); align-items: flex-start; }
.pmodal__feat:last-of-type { border-bottom: 0; }
.pmodal__feat .ic { color: var(--green-700); display: flex; margin-top: 1px; }
.pmodal__feat b { font-family: var(--font-display); font-size: 15px; display: block; }
.pmodal__feat span { font-family: var(--font-mono); font-size: 12px; color: var(--ink-600); line-height: 1.5; }
.pmodal__price { display: flex; align-items: baseline; gap: 8px; margin: var(--s-4) 0 var(--s-4); font-family: var(--font-mono); }
.pmodal__price .amt { font-size: 34px; font-weight: 800; letter-spacing: -0.02em; }
.pmodal__price .per { font-size: 12px; color: var(--ink-400); }
.pmodal__fine { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); text-align: center; margin-top: var(--s-3); }

/* locked feature card */
.lockcard { border: var(--bw) solid var(--ink-900); background: var(--paper); padding: var(--s-4) var(--s-5); display: flex; align-items: center; gap: var(--s-4); cursor: pointer; }
.lockcard:hover { background: var(--green-100); }
.lockcard__ic { width: 44px; height: 44px; border: var(--bw) solid var(--ink-900); background: var(--ink-900); color: var(--green-300); display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.lockcard b { font-family: var(--font-display); font-size: 15px; display: flex; align-items: center; gap: 8px; }
.lockcard p { margin: 3px 0 0; font-family: var(--font-mono); font-size: 12px; color: var(--ink-600); }
.lockcard .go { margin-left: auto; color: var(--ink-400); display: flex; }

/* ---- toggle (brutalist square switch) --------------------- */
.tgl { position: relative; width: 50px; height: 28px; border: 2px solid var(--ink-900); background: var(--paper); cursor: pointer; padding: 0; flex: 0 0 auto; }
.tgl::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: var(--ink-900); transition: left var(--dur) var(--ease); }
.tgl.is-on { background: var(--green-500); }
.tgl.is-on::after { left: 25px; }

/* ============================================================
   ALERTS / WATCHLIST
   ============================================================ */
.al { padding: var(--s-6) 0 var(--s-9); }
.al__head { display: flex; align-items: flex-end; justify-content: space-between; gap: var(--s-4); margin-bottom: var(--s-5); flex-wrap: wrap; }
.al__head h1 { font-size: 30px; margin: 0; letter-spacing: -0.02em; }
.al__head .sub { font-family: var(--font-mono); font-size: 13px; color: var(--ink-400); margin-top: 6px; }
.al .seg { max-width: 380px; }
.al .seg button .n { font-size: 10px; background: var(--green-500); color: var(--ink-900); padding: 1px 6px; margin-left: 2px; }

.alrow { display: grid; grid-template-columns: 64px minmax(0,1fr) 130px 130px 150px 96px; gap: var(--s-4); align-items: center; padding: var(--s-3) var(--s-4); border-bottom: var(--bw-hair) solid var(--ink-300); position: relative; }
.alrow:last-child { border-bottom: 0; }
.alrow:hover { background: var(--canvas); }
.alrow.is-hit { background: var(--green-100); }
.alrow.is-paused > *:not(.alrow__act) { opacity: 0.45; }
.alrow__name { font-family: var(--font-display); font-weight: 600; font-size: 16px; line-height: 1.2; cursor: pointer; }
.alrow__name:hover { text-decoration: underline; text-underline-offset: 3px; }
.alrow__meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
.alrow__lbl { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-400); margin-bottom: 3px; }
.alrow__act { display: flex; justify-content: flex-end; gap: 6px; }
.iconbtn { width: 36px; height: 36px; border: 2px solid transparent; background: none; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-600); padding: 0; }
.iconbtn:hover { border-color: var(--ink-900); background: var(--paper); color: var(--ink-900); }
.iconbtn.danger:hover { border-color: var(--up-600); color: var(--up-600); background: var(--up-100); }

.tgt-btn { display: inline-flex; align-items: center; gap: 7px; border: 2px solid var(--ink-900); background: var(--paper); color: var(--ink-900); padding: 6px 10px; cursor: pointer; font-family: var(--font-mono); font-weight: 800; font-size: 14px; font-variant-numeric: tabular-nums; }
.tgt-btn:hover { box-shadow: var(--shadow-sm); }
.tgt-btn .icon { color: var(--ink-400); display: flex; }
.tgt-edit { display: inline-flex; align-items: stretch; border: 2px solid var(--ink-900); box-shadow: var(--shadow-sm); background: var(--paper); }
.tgt-edit .cur { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); display: flex; align-items: center; padding: 0 0 0 8px; }
.tgt-edit input { width: 64px; border: 0; outline: 0; background: none; font-family: var(--font-mono); font-weight: 800; font-size: 14px; padding: 6px 4px; }
.tgt-edit button { border: 0; border-left: 2px solid var(--ink-900); background: var(--green-500); color: var(--ink-900); cursor: pointer; display: flex; align-items: center; padding: 0 8px; }
.tgt-edit button:hover { background: var(--green-300); }

.undo-bar { display: flex; align-items: center; justify-content: space-between; gap: var(--s-4); background: var(--ink-900); color: var(--paper); padding: 10px var(--s-4); font-family: var(--font-mono); font-size: 12px; margin-bottom: var(--s-4); animation: pop-in var(--dur) var(--ease) both; }
.undo-bar a { color: var(--green-300); cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

/* activity feed (full page) */
.actfeed { border: var(--bw) solid var(--ink-900); background: var(--paper); }
.actrow { display: flex; gap: var(--s-4); padding: var(--s-4); border-bottom: var(--bw-hair) solid var(--ink-300); cursor: pointer; align-items: flex-start; }
.actrow:last-child { border-bottom: 0; }
.actrow:hover { background: var(--canvas); }
.actrow__dot { width: 40px; height: 40px; border: var(--bw) solid var(--ink-900); display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.actrow__dot.down { background: var(--green-500); }
.actrow__dot.up { background: var(--up-100); color: var(--up-600); }
.actrow__dot.watch { background: var(--warn-500); }
.actrow__txt { font-size: 15px; line-height: 1.45; }
.actrow__txt b { font-family: var(--font-display); }
.actrow__meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 4px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.actrow__price { margin-left: auto; text-align: right; font-family: var(--font-mono); white-space: nowrap; }
.actrow__price .to { font-weight: 800; font-size: 17px; }
.actrow__price .from { font-size: 12px; color: var(--ink-400); text-decoration: line-through; display: block; }

/* ============================================================
   ACCOUNT & SETTINGS
   ============================================================ */
.acct { padding: var(--s-6) 0 var(--s-9); }
.acct h1 { font-size: 30px; margin: 0 0 var(--s-5); letter-spacing: -0.02em; }
.acct__grid { display: grid; grid-template-columns: 230px minmax(0,1fr); gap: var(--s-6); align-items: start; }
.acct__nav { border: var(--bw) solid var(--ink-900); background: var(--paper); position: sticky; top: 88px; }
.acct__nav a { display: flex; align-items: center; gap: 10px; padding: 12px var(--s-4); font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-600); cursor: pointer; border-bottom: var(--bw-hair) solid var(--ink-300); }
.acct__nav a:last-child { border-bottom: 0; }
.acct__nav a:hover { background: var(--canvas); color: var(--ink-900); }
.acct__nav a.is-on { background: var(--ink-900); color: var(--paper); }
.acct__nav a .icon { display: flex; }

.asec { border: var(--bw) solid var(--ink-900); background: var(--paper); margin-bottom: var(--s-5); }
.asec__head { padding: var(--s-4) var(--s-5); border-bottom: var(--bw) solid var(--ink-900); display: flex; align-items: center; justify-content: space-between; gap: var(--s-3); }
.asec__head h2 { margin: 0; font-size: 18px; }
.asec__head .hint { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); }
.asec__body { padding: var(--s-5); }
.arow { display: flex; align-items: center; justify-content: space-between; gap: var(--s-5); padding: var(--s-4) var(--s-5); border-bottom: var(--bw-hair) solid var(--ink-300); }
.arow:last-child { border-bottom: 0; }
.arow__txt b { font-family: var(--font-display); font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.arow__txt p { margin: 3px 0 0; font-family: var(--font-mono); font-size: 12px; color: var(--ink-600); line-height: 1.5; max-width: 480px; }
.arow.is-locked .arow__txt b { color: var(--ink-400); }

.chipset { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.chipset .cchip.is-on { background: var(--ink-900); color: var(--paper); }

.asec--danger { border-color: var(--up-600); }
.asec--danger .asec__head { border-bottom-color: var(--up-600); }
.asec--danger .asec__head h2 { color: var(--up-600); }

.planbox { border: var(--bw-bold) solid var(--ink-900); padding: var(--s-5); display: flex; align-items: center; gap: var(--s-5); background: var(--canvas); flex-wrap: wrap; }
.planbox.is-plus { background: var(--ink-900); color: var(--paper); box-shadow: var(--shadow-green); }
.planbox__name { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-400); }
.planbox h3 { margin: 4px 0 0; font-size: 24px; letter-spacing: -0.02em; }
.planbox.is-plus h3 { color: var(--paper); }
.planbox .spacer { flex: 1; }

.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--ink-900); color: var(--paper); border: 2px solid var(--ink-900); box-shadow: var(--shadow-green); padding: 12px 20px; font-family: var(--font-mono); font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 10px; z-index: 300; animation: pop-in var(--dur) var(--ease) both; }
.toast .icon { color: var(--green-500); display: flex; }

/* ============================================================
   CATEGORIES BROWSE
   ============================================================ */
.browse { padding: var(--s-6) 0 var(--s-9); }
.browse__head { margin-bottom: var(--s-5); }
.browse__head h1 { font-size: 30px; margin: 0; letter-spacing: -0.02em; }
.browse__head .sub { font-family: var(--font-mono); font-size: 13px; color: var(--ink-400); margin-top: 6px; }
.bigcats { display: grid; grid-template-columns: repeat(4, 1fr); border: var(--bw) solid var(--ink-900); border-right: 0; border-bottom: 0; margin-bottom: var(--s-7); }
.bigcat { border-right: var(--bw) solid var(--ink-900); border-bottom: var(--bw) solid var(--ink-900); background: var(--paper); padding: var(--s-5); cursor: pointer; min-height: 170px; display: flex; flex-direction: column; }
.bigcat:hover { background: var(--green-100); }
.bigcat__ic { width: 44px; height: 44px; border: var(--bw) solid var(--ink-900); background: var(--canvas-2); display: flex; align-items: center; justify-content: center; margin-bottom: var(--s-4); }
.bigcat:hover .bigcat__ic { background: var(--green-500); }
.bigcat h3 { margin: 0; font-size: 18px; letter-spacing: -0.01em; }
.bigcat__count { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 3px; }
.bigcat__drop { margin-top: auto; padding-top: var(--s-3); font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); display: flex; align-items: center; gap: 7px; }

/* ============================================================
   ONBOARDING
   ============================================================ */
.ob { min-height: 100vh; background: var(--canvas); display: flex; flex-direction: column; }
.ob__hdr { display: flex; align-items: center; justify-content: space-between; padding: var(--s-4) var(--s-6); border-bottom: var(--bw) solid var(--ink-900); background: var(--paper); }
.ob__skip { font-family: var(--font-mono); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-400); cursor: pointer; }
.ob__skip:hover { color: var(--ink-900); }
.ob__bar { display: flex; gap: 4px; height: 6px; background: var(--paper); border-bottom: var(--bw) solid var(--ink-900); }
.ob__bar i { flex: 1; background: var(--canvas-2); }
.ob__bar i.done { background: var(--green-500); }
.ob__body { flex: 1; width: 100%; max-width: 780px; margin: 0 auto; padding: var(--s-7) var(--gutter) 140px; }
.ob__step-n { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--green-700); margin-bottom: var(--s-2); }
.ob h1 { font-size: clamp(28px, 4vw, 40px); letter-spacing: -0.025em; line-height: 1.02; margin: 0 0 var(--s-2); }
.ob h1 .hl { background: var(--green-500); padding: 0 6px; }
.ob__sub { font-family: var(--font-mono); font-size: 13px; color: var(--ink-600); margin: 0 0 var(--s-6); line-height: 1.6; }

.ob-cats { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--s-3); }
.ob-cat { border: var(--bw) solid var(--ink-900); background: var(--paper); color: var(--ink-900); padding: var(--s-4); cursor: pointer; position: relative; text-align: left; font-family: inherit; }
.ob-cat:hover { box-shadow: var(--shadow-sm); }
.ob-cat.is-on { background: var(--green-100); box-shadow: var(--shadow); }
.ob-cat__ic { color: var(--ink-600); margin-bottom: 10px; display: flex; }
.ob-cat.is-on .ob-cat__ic { color: var(--green-700); }
.ob-cat b { font-family: var(--font-display); font-size: 15px; font-weight: 600; display: block; }
.ob-cat span { font-family: var(--font-mono); font-size: 10px; color: var(--ink-400); }
.ob-cat__chk { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border: 2px solid var(--ink-900); background: var(--paper); display: flex; align-items: center; justify-content: center; }
.ob-cat.is-on .ob-cat__chk { background: var(--green-500); }

.ob-prods { border: var(--bw) solid var(--ink-900); background: var(--paper); }
.ob-prod { display: grid; grid-template-columns: 52px minmax(0,1fr) 150px 130px; gap: var(--s-4); align-items: center; padding: var(--s-3) var(--s-4); border-bottom: var(--bw-hair) solid var(--ink-300); }
.ob-prod:last-child { border-bottom: 0; }
.ob-prod.is-on { background: var(--green-100); }
.ob-prod__img { width: 52px; height: 46px; background: var(--canvas-2); border: var(--bw-hair) solid var(--ink-300); display: flex; align-items: center; justify-content: center; color: var(--ink-400); }
.ob-prod b { font-family: var(--font-display); font-size: 15px; font-weight: 600; line-height: 1.2; display: block; }
.ob-prod .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-400); margin-top: 2px; }

.ob__foot { position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper); border-top: var(--bw) solid var(--ink-900); z-index: 100; }
.ob__foot-row { max-width: 780px; margin: 0 auto; padding: var(--s-4) var(--gutter); display: flex; align-items: center; justify-content: space-between; gap: var(--s-4); }
.ob__count { font-family: var(--font-mono); font-size: 12px; color: var(--ink-600); }
.ob__count b { color: var(--green-700); }

/* ============================================================
   ABOUT / HOW IT WORKS (public)
   ============================================================ */
.about-hero { padding: var(--s-8) 0 var(--s-7); }
.about-hero .kicker { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--green-700); margin-bottom: var(--s-3); }
.about-hero h1 { font-size: clamp(40px, 5.4vw, 68px); line-height: 0.98; letter-spacing: -0.03em; margin: 0 0 var(--s-4); max-width: 800px; }
.about-hero h1 .hl { background: var(--green-500); padding: 0 10px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
.about-hero p { font-size: 18px; color: var(--ink-600); max-width: 560px; line-height: 1.55; margin: 0; }

.manifesto { background: var(--ink-900); color: var(--paper); padding: var(--s-8) 0; margin: var(--s-8) 0; }
.manifesto h2 { color: var(--paper); font-size: clamp(28px, 3.6vw, 44px); letter-spacing: -0.025em; line-height: 1.05; margin: 0 0 var(--s-4); max-width: 720px; }
.manifesto h2 .hl { background: var(--green-500); color: var(--ink-900); padding: 0 8px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
.manifesto p { color: var(--ink-300); font-size: 16px; line-height: 1.6; max-width: 620px; margin: 0 0 var(--s-3); }
.manifesto p b { color: var(--paper); }

.faq { border: var(--bw) solid var(--ink-900); background: var(--paper); }
.faq__item { border-bottom: var(--bw) solid var(--ink-900); }
.faq__item:last-child { border-bottom: 0; }
.faq__q { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: var(--s-4); background: none; border: 0; padding: var(--s-4) var(--s-5); font-family: var(--font-display); font-weight: 600; font-size: 17px; text-align: left; cursor: pointer; color: var(--ink-900); }
.faq__q:hover { background: var(--canvas); }
.faq__q .icon { display: flex; color: var(--ink-400); transition: transform var(--dur) var(--ease); }
.faq__item.is-open .faq__q .icon { transform: rotate(45deg); }
.faq__a { padding: 0 var(--s-5) var(--s-5); font-size: 15px; line-height: 1.6; color: var(--ink-600); max-width: 720px; }

@media (max-width: 960px) {
  .bigcats, .ob-cats { grid-template-columns: repeat(2, 1fr); }
  .acct__grid { grid-template-columns: 1fr; }
  .acct__nav { position: static; display: flex; overflow-x: auto; }
  .acct__nav a { border-bottom: 0; border-right: var(--bw-hair) solid var(--ink-300); white-space: nowrap; }
  .alrow { grid-template-columns: 52px minmax(0,1fr) 120px 96px; }
  .alrow__spark, .alrow__tgtcol { display: none; }
}


/* ============================================================
   AUTO-BUY · BANKID · FULLMAKT
   ============================================================ */

/* --- BankID -------------------------------------------------- */
.bankid-mark { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.01em; white-space: nowrap; }
.bankid-mark b { font-weight: 700; }
.bankid-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 52px; border: var(--bw) solid var(--ink-900); background: var(--ink-900); color: var(--paper); font-family: var(--font-display); font-weight: 600; font-size: 15px; cursor: pointer; box-shadow: var(--shadow-green); transition: transform var(--dur-fast) var(--ease); }
.bankid-btn:hover:not(:disabled) { transform: translate(-1px, -1px); }
.bankid-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
.bankid-btn .spinner { width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
.bankid-btn .icon { display: flex; color: var(--green-300); }

.or-div { display: flex; align-items: center; gap: 12px; margin: var(--s-4) 0; color: var(--ink-400); font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.or-div::before, .or-div::after { content: ''; flex: 1; height: 1px; background: var(--ink-300); }
.bankid-hint { font-family: var(--font-mono); font-size: 11px; color: var(--ink-600); margin: 8px 0 0; line-height: 1.5; display: flex; gap: 6px; align-items: flex-start; }
.bankid-hint .icon { color: var(--green-700); display: flex; margin-top: 1px; }
